<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Winter Edition x100</title>
    <style>
        :root { --p: #00ff88; --bg: #050a15; --rb: #f093fb; --snow: #ffffff; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            user-select: none; 
            overflow: hidden; 
        }

        /* Фон со снегом */
        #snow-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .card { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(15px);
            padding: 30px; 
            border-radius: 35px; 
            text-align: center; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8); 
            width: 350px; 
            border: 1px solid rgba(255,255,255,0.1); 
            z-index: 10;
            position: relative;
        }

        .bal { 
            font-size: 2.6rem; 
            font-weight: 900; 
            color: var(--p); 
            margin: 10px 0; 
            text-shadow: 0 0 20px rgba(0,255,136,0.4);
        }

        .coin { 
            width: 150px; height: 150px; 
            background: radial-gradient(circle, #ffd700, #ff8c00); 
            border-radius: 50%; 
            margin: 25px auto; 
            cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 75px; 
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3); 
            transition: 0.1s; 
            border: 5px solid rgba(255,255,255,0.2);
        }
        .coin:active { transform: scale(0.9); }

        button { 
            width: 100%; padding: 16px; border-radius: 15px; border: none; 
            margin-top: 12px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s; 
        }
        .u-btn { background: var(--p); color: #052e16; }
        .r-btn { background: var(--rb); color: white; box-shadow: 0 0 15px rgba(240, 147, 251, 0.3); }
        button:disabled { opacity: 0.1; cursor: not-allowed; filter: grayscale(1); }

        .plus { 
            position: absolute; color: var(--p); font-weight: bold; 
            animation: f 0.8s forwards; pointer-events: none; 
            font-size: 1.8rem; z-index: 100; text-shadow: 0 0 5px black;
        }
        @keyframes f { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-130px); opacity: 0; } }

        #m-info { color: var(--rb); font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<canvas id="snow-canvas"></canvas>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px;">TELEBANK ULTIMATE x100</div>
    <div class="bal"><span id="b">0</span> ₽</div>
    <div id="m-info">МНОЖИТЕЛЬ: x1</div>
    
    <div class="coin" id="coin-btn">🪙</div>
    
    <div id="shop">
        <p style="font-size: 0.9rem;">ДОХОД: <span id="t-pwr" style="color: var(--p)">100</span> ₽/ТАП</p>
        <div id="upgrade-slot"></div>
        <div id="rebirth-slot"></div>
        <div id="max-txt" style="display:none; color: gold; font-weight:bold; margin-top:15px; font-size: 1.2rem;">ULTIMATE POWER 👑</div>
    </div>
</div>

<script>
    // 1. СНЕГ (ВИЗУАЛ)
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    let flakes = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    function createFlakes() {
        for(let i=0; i<100; i++) {
            flakes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, d: Math.random()*1 });
        }
    }

    function drawSnow() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.beginPath();
        for(let f of flakes) {
            ctx.moveTo(f.x, f.y);
            ctx.arc(f.x, f.y, f.r, 0, Math.PI*2, true);
            f.y += Math.cos(f.d) + 1 + f.r/2;
            f.x += Math.sin(f.d) * 2;
            if(f.y > canvas.height) { f.y = -10; f.x = Math.random()*canvas.width; }
        }
        ctx.fill();
        requestAnimationFrame(drawSnow);
    }
    createFlakes();
    drawSnow();

    // 2. ЛОГИКА ИГРЫ
    const POWERS = [100, 200, 300, 400, 1000, 1500, 3000, 15000, 35000];
    const COSTS = [500, 1500, 5000, 10000, 50000, 150000, 1000000, 2500000];
    const RB_LIST = [
        { c: 15000, m: 2, n: "x2" },
        { c: 50000, m: 3, n: "x3" },
        { c: 200000, m: 4, n: "x4" },
        { c: 10000000, m: 10, n: "MEGA x10" },
        { c: 100000000, m: 100, n: "ULTRA x100" }
    ];

    let game = { balance: 0, level: 0, mult: 1 };

    const saved = localStorage.getItem('tb_ultra_v100');
    if (saved) { try { game = JSON.parse(saved); } catch(e) {} }

    const coin = document.getElementById('coin-btn');
    coin.addEventListener('click', function(e) {
        let gain = POWERS[game.level] * game.mult;
        game.balance += gain;
        
        const p = document.createElement('div');
        p.className = 'plus';
        p.innerText = "+" + gain.toLocaleString();
        p.style.left = e.clientX + "px";
        p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        
        update();
    });

    function buyUpgrade() {
        if (game.balance >= COSTS[game.level]) {
            game.balance -= COSTS[game.level];
            game.level++;
            update();
        }
    }

    function buyRebirth(idx) {
        let rb = RB_LIST[idx];
        if (game.balance >= rb.c) {
            game.balance = 0; game.level = 0; game.mult = rb.m;
            update();
        }
    }

    function update() {
        document.getElementById('b').innerText = Math.floor(game.balance).toLocaleString();
        document.getElementById('t-pwr').innerText = (POWERS[game.level] * game.mult).toLocaleString();
        document.getElementById('m-info').innerText = "МНОЖИТЕЛЬ СИСТЕМЫ: x" + game.mult;

        const upgSlot = document.getElementById('upgrade-slot');
        if (game.level < 8) {
            upgSlot.innerHTML = `<button class="u-btn" id="upg-btn">LEVEL ${game.level + 2} (${COSTS[game.level].toLocaleString()} ₽)</button>`;
            const b = document.getElementById('upg-btn');
            b.onclick = buyUpgrade;
            b.disabled = game.balance < COSTS[game.level];
            document.getElementById('max-txt').style.display = 'none';
        } else {
            upgSlot.innerHTML = "";
            document.getElementById('max-txt').style.display = 'block';
        }

        const rbSlot = document.getElementById('rebirth-slot');
        let nextRbIdx = RB_LIST.findIndex(r => r.m > game.mult);
        if (nextRbIdx !== -1) {
            let rb = RB_LIST[nextRbIdx];
            rbSlot.innerHTML = `<button class="r-btn" id="rb-btn">REBIRTH ${rb.n} (${rb.c.toLocaleString()} ₽)</button>`;
            const b = document.getElementById('rb-btn');
            b.onclick = () => buyRebirth(nextRbIdx);
            b.disabled = game.balance < rb.c;
        } else {
            rbSlot.innerHTML = "";
        }

        localStorage.setItem('tb_ultra_v100', JSON.stringify(game));
    }

    update();
</script>
</body>
</html>
