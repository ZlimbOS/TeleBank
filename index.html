<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Season 1 Turbo</title>
    <style>
        :root { --p: #00ff88; --bg: #030712; --rb: #f093fb; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: white; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; 
            user-select: none; overflow: hidden; 
        }
        #snow-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        /* ЗАГОЛОВОК СЕЗОНА */
        .season-header {
            font-size: 2.2rem; font-weight: 900; color: #ffffff;
            text-transform: uppercase; letter-spacing: 6px; margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4); z-index: 10;
        }

        .card { 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 30px; text-align: center; 
            box-shadow: 0 0 100px rgba(0,255,136,0.1); width: 360px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }
        .money-val { font-size: 1.8rem; font-weight: 900; color: var(--p); margin: 10px 0; text-shadow: 0 0 20px rgba(0,255,136,0.4); }
        
        .coin-btn { 
            width: 130px; height: 130px; 
            background: radial-gradient(circle, #ffd700, #ff8c00); 
            border-radius: 50%; margin: 20px auto; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 65px; box-shadow: 0 0 50px rgba(255, 165, 0, 0.3); 
            transition: 0.05s; border: 5px solid rgba(255,255,255,0.2);
            position: relative; z-index: 20;
        }
        .coin-btn.wait { opacity: 0.8; transform: scale(0.98) brightness(1.2); }
        
        button.game-btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            margin-top: 8px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s;
        }
        .u-btn { background: var(--p); color: #000; }
        .r-btn { background: var(--rb); color: white; }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        
        .plus { 
            position: absolute; color: var(--p); font-weight: bold; 
            animation: moveUp 0.4s forwards; pointer-events: none; 
            font-size: 1.1rem; z-index: 150; text-shadow: 0 0 5px #000;
        }
        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-80px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="snow-box"></canvas>
<div class="season-header">СЕЗОН 1</div>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px;">TELEBANK TURBO</div>
    <div class="money-val" id="bal">0 ₽</div>
    <div id="m-info" style="color: var(--rb); font-size: 0.9rem; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
    
    <div class="coin-btn" id="coin">🪙</div>
    
    <div id="shop">
        <p style="font-size: 0.85rem;"><span id="inc-lbl">ДОХОД:</span> <span id="inc-val" style="color: var(--p)">100</span> ₽</p>
        <div id="u-area"></div>
        <div id="r-area"></div>
    </div>
</div>

<script>
    // 1. КОНФИГУРАЦИЯ (BigInt для защиты от ошибок в триллионах)
    const POWERS = [100n, 200n, 400n, 1000n, 5000n, 20000n, 100000n, 500000n, 1000000n, 2000000n, 600000000n, 2000000000n, 2000000000n * 1000n];
    const COSTS = [1000n, 5000n, 20000n, 100000n, 1000000n, 10000000n, 100000000n, 1000000000n, 10000000000n, 100000000000n, 500000000000000n, 500000000000000000n];
    const REBIRTHS = [
        { c: 1000000n, m: 10n, n: "x10" },
        { c: 1000000000n, m: 100n, n: "x100" },
        { c: 2000000000000n, m: 400n, n: "x400" },
        { c: 15000000000000000n, m: 5000n, n: "OMEGA x5000" }
    ];

    let state = { b: 0n, l: 0, m: 1n };
    let wait = false;
    const SAVE_KEY = 'telebank_turbo_final_s1';

    // 2. СИСТЕМА СОХРАНЕНИЯ
    function load() {
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) {
            try {
                const d = JSON.parse(saved);
                state.b = BigInt(d.b); state.l = d.l; state.m = BigInt(d.m);
            } catch(e) { console.error("Ошибка загрузки"); }
        }
    }
    function save() {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
            b: state.b.toString(), l: state.l, m: state.m.toString()
        }));
    }
    load();

    // 3. ФОРМАТИРОВАНИЕ
    function f(n) {
        let num = BigInt(n);
        if (num >= 1e15) return (Number(num / 1000000000000n) / 1000).toFixed(3) + " КВАДР";
        if (num >= 1e12) return (Number(num / 1000000000n) / 1000).toFixed(2) + " ТРЛН";
        if (num >= 1e9) return (Number(num / 1000000n) / 1000).toFixed(2) + " МЛРД";
        if (num >= 1e6) return (Number(num / 1000n) / 1000).toFixed(1) + " МЛН";
        return num.toLocaleString();
    }

    function getP() { return POWERS[state.l] * state.m; }

    // 4. ДОХОД И КЛИК (0.1 сек)
    setInterval(() => {
        if (state.l >= 9) {
            state.b += getP(); refresh(); save();
        }
    }, 1000);

    document.getElementById('coin').onclick = (e) => {
        if (wait) return;
        wait = true;
        state.b += getP();
        const c = document.getElementById('coin');
        c.classList.add('wait');
        
        // Кулдаун 0.1 секунды
        setTimeout(() => { wait = false; c.classList.remove('wait'); }, 100);

        const anim = document.createElement('div');
        anim.className = 'plus';
        anim.innerText = "+" + f(getP());
        anim.style.left = e.clientX + "px";
        anim.style.top = e.clientY + "px";
        document.body.appendChild(anim);
        setTimeout(() => anim.remove(), 400);
        refresh(); save();
    };

    // 5. МАГАЗИН
    window.buyL = () => {
        if (state.b >= COSTS[state.l]) {
            state.b -= COSTS[state.l]; state.l++; save(); refresh();
        }
    };
    window.buyR = (i) => {
        if (state.b >= REBIRTHS[i].c) {
            state.b = 0n; state.l = 0; state.m = REBIRTHS[i].m; save(); refresh();
        }
    };

    function refresh() {
        document.getElementById('bal').innerText = f(state.b) + " ₽";
        document.getElementById('m-info').innerText = "МНОЖИТЕЛЬ: x" + state.m;
        let isA = state.l >= 9;
        document.getElementById('inc-lbl').innerText = isA ? "АВТО-ДОХОД:" : "ДОХОД:";
        document.getElementById('inc-val').innerText = f(getP()) + (isA ? " /СЕК" : " /ТАП");
        
        const uA = document.getElementById('u-area');
        if (state.l < COSTS.length) {
            let cost = COSTS[state.l];
            uA.innerHTML = `<button class="game-btn u-btn" onclick="buyL()" ${state.b < cost ? 'disabled' : ''}>УЛУЧШИТЬ: ${f(cost)} ₽</button>`;
        } else { uA.innerHTML = "<div style='color:gold; font-weight:bold; margin-top:10px;'>MAX LEVEL 👑</div>"; }
        
        const rA = document.getElementById('r-area');
        let next = REBIRTHS.findIndex(r => r.m > state.m);
        if (next !== -1) {
            let rb = REBIRTHS[next];
            rA.innerHTML = `<button class="game-btn r-btn" onclick="buyR(${next})" ${state.b < rb.c ? 'disabled' : ''}>REBIRTH ${rb.n} (${f(rb.c)} ₽)</button>`;
        } else { rA.innerHTML = ""; }
    }

    // 6. СНЕГ (Визуал)
    const canvas = document.getElementById('snow-box');
    const ctx = canvas.getContext('2d');
    let flakes = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    for(let i=0; i<40; i++) flakes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, s: Math.random()*1+0.2});
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white"; ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            f.y += f.s; if(f.y > canvas.height) f.y = -5;
        });
        ctx.fill(); requestAnimationFrame(draw);
    }
    draw(); refresh();
</script>
</body>
</html>
