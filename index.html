<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Promo Edition</title>
    <style>
        :root { --p: #00ff88; --bg: #030712; --rb: #f093fb; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: white; display: flex; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; 
            user-select: none; overflow: hidden; 
        }

        #snow {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .card { 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 30px; text-align: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); width: 340px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }

        .bal { font-size: 2.5rem; font-weight: 900; color: var(--p); margin: 5px 0; }

        .coin { 
            width: 130px; height: 130px; 
            background: radial-gradient(circle, #ffd700, #ff8c00); 
            border-radius: 50%; margin: 15px auto; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 65px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); 
            transition: 0.1s; z-index: 20;
        }
        .coin:active { transform: scale(0.9); }

        button { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            margin-top: 8px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s; 
        }
        .u-btn { background: var(--p); color: #052e16; }
        .r-btn { background: var(--rb); color: white; }
        .promo-btn { background: #3b82f6; color: white; font-size: 10px; }
        button:disabled { opacity: 0.1; cursor: not-allowed; }

        input {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155;
            background: rgba(0,0,0,0.3); color: white; text-align: center;
            margin-top: 15px; outline: none; box-sizing: border-box;
        }

        .plus { 
            position: absolute; color: var(--p); font-weight: bold; 
            animation: f 0.8s forwards; pointer-events: none; 
            font-size: 1.5rem; z-index: 100;
        }
        @keyframes f { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="snow"></canvas>

<div class="card">
    <div style="font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px;">TELEBANK WINTER PROMO</div>
    <div class="bal"><span id="b">0</span> ₽</div>
    <div id="m-info" style="color: var(--rb); font-size: 0.8rem; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
    
    <div class="coin" id="coin">🪙</div>
    
    <div id="shop">
        <p style="font-size: 0.8rem;">ДОХОД: <span id="t" style="color: var(--p)">100</span> ₽/ТАП</p>
        <div id="u-slot"></div>
        <div id="r-slot"></div>
        <div id="mx" style="display:none; color: gold; font-weight:bold; margin-top:10px;">MAX POWER 👑</div>
    </div>

    <!-- БЛОК ПРОМОКОДА -->
    <div id="promo-area">
        <input type="text" id="promo-input" placeholder="ВВЕДИТЕ ПРОМОКОД">
        <button class="promo-btn" onclick="usePromo()">Активировать</button>
    </div>
</div>

<script>
    // Настройки
    const POWERS =;
    const COSTS =;
    const RBS = [
        { c: 15000, m: 2, n: "x2" },
        { c: 50000, m: 3, n: "x3" },
        { c: 200000, m: 4, n: "x4" },
        { c: 10000000, m: 10, n: "x10" },
        { c: 100000000, m: 100, n: "x100" }
    ];

    let game = { balance: 0, level: 0, mult: 1, promoUsed: false };

    // Загрузка
    const saved = localStorage.getItem('tb_promo_v1');
    if (saved) game = JSON.parse(saved);

    // Снег
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');
    let flakes = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    for(let i=0; i<100; i++) flakes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, s: Math.random()*1+0.5});
    function snow() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white"; ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            f.y += f.s; if(f.y > canvas.height) f.y = -10;
        });
        ctx.fill(); requestAnimationFrame(snow);
    }
    snow();

    // Тап
    document.getElementById('coin').onclick = function(e) {
        let gain = POWERS[game.level] * game.mult;
        game.balance += gain;
        const p = document.createElement('div');
        p.className = 'plus'; p.innerText = "+" + gain.toLocaleString();
        p.style.left = e.clientX + "px"; p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        update();
    };

    function buyU() {
        if (game.balance >= COSTS[game.level]) {
            game.balance -= COSTS[game.level]; game.level++; update();
        }
    }

    function buyR(idx) {
        if (game.balance >= RBS[idx].c) {
            game.balance = 0; game.level = 0; game.mult = RBS[idx].m; update();
        }
    }

    // ПРОМОКОД
    function usePromo() {
        const input = document.getElementById('promo-input').value.trim().toUpperCase();
        if (game.promoUsed) {
            alert("Вы уже использовали промокод!");
            return;
        }
        if (input === "РУБЦОВ") {
            game.balance += 100000;
            game.promoUsed = true;
            alert("Промокод активирован! +100,000 ₽");
            update();
        } else {
            alert("Неверный промокод!");
        }
    }

    function update() {
        document.getElementById('b').innerText = Math.floor(game.balance).toLocaleString();
        document.getElementById('t').innerText = (POWERS[game.level] * game.mult).toLocaleString();
        document.getElementById('m-info').innerText = "МНОЖИТЕЛЬ: x" + game.mult;

        // Скрытие промо-зоны
        if (game.promoUsed) {
            document.getElementById('promo-area').style.display = 'none';
        }

        const uSlot = document.getElementById('u-slot');
        if (game.level < 8) {
            uSlot.innerHTML = `<button class="u-btn" onclick="buyU()">LEVEL ${game.level + 2} (${COSTS[game.level].toLocaleString()} ₽)</button>`;
            uSlot.querySelector('button').disabled = game.balance < COSTS[game.level];
            document.getElementById('mx').style.display = 'none';
        } else {
            uSlot.innerHTML = ""; document.getElementById('mx').style.display = 'block';
        }

        const rSlot = document.getElementById('r-slot');
        let nextRb = RBS.findIndex(r => r.m > game.mult);
        if (nextRb !== -1) {
            rSlot.innerHTML = `<button class="r-btn" onclick="buyR(${nextRb})">REBIRTH ${RBS[nextRb].n} (${RBS[nextRb].c.toLocaleString()} ₽)</button>`;
            rSlot.querySelector('button').disabled = game.balance < RBS[nextRb].c;
        } else { rSlot.innerHTML = ""; }

        localStorage.setItem('tb_promo_v1', JSON.stringify(game));
    }

    update();
</script>
</body>
</html>
