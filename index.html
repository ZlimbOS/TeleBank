<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoBank | Absolute Edition</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.95);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 350px;
        }

        h2 { font-size: 2.2rem; margin: 0 0 10px; color: var(--primary); text-transform: uppercase; letter-spacing: 3px; }

        .stats-box {
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .balance-value { font-size: 2.3rem; font-weight: bold; color: var(--primary); display: block; }
        
        .coin {
            width: 140px; height: 140px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 70px; margin: 20px auto;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            transition: transform 0.05s;
        }
        .coin:active { transform: scale(0.9); }

        button {
            background: linear-gradient(135deg, #00ff88, #00bd65);
            color: #052e16;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            text-transform: uppercase;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        button:hover:not(:disabled) { transform: scale(1.02); }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .rebirth-btn { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; display: none; }

        .plus-one {
            position: absolute; color: var(--primary); font-weight: bold;
            animation: floatUp 0.8s ease-out forwards; pointer-events: none;
            z-index: 100; font-size: 1.5rem;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }

        .reset-link { color: #ff4444; font-size: 10px; margin-top: 25px; cursor: pointer; opacity: 0.4; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <h2>NeoBank</h2>
        <div style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 15px; letter-spacing: 1px;">PREMIUM CLICKER v5.0</div>
        
        <div class="stats-box">
            <span style="font-size: 0.7rem; opacity: 0.6;">ВАШ БАЛАНС</span>
            <span class="balance-value"><span id="ui-balance">0</span> ₽</span>
            <div id="ui-mult" style="color: #f093fb; font-size: 0.8rem; margin-top: 5px; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
        </div>

        <div class="coin" id="main-coin">🪙</div>

        <div id="shop">
            <p style="font-size: 0.8rem; margin-bottom: 10px;">ДОХОД: <span id="ui-tap" style="color: var(--primary)">100</span> ₽ / ТАП</p>
            
            <div id="upgrade-area">
                <!-- Кнопка лвла будет тут -->
            </div>
            
            <button id="rb1" class="rebirth-btn">REBIRTH x2 (15000 ₽)</button>
            <button id="rb2" class="rebirth-btn">REBIRTH x3 (50000 ₽)</button>
            <button id="rb3" class="rebirth-btn">REBIRTH x4 (200000 ₽)</button>
            
            <div id="max-msg" style="display:none; color: gold; font-weight: bold; margin-top: 15px; text-shadow: 0 0 10px rgba(255,215,0,0.5);">MAX LEVEL REACHED 👑</div>
        </div>

        <span class="reset-link" id="hard-reset">СБРОСИТЬ ВЕСЬ ПРОГРЕСС</span>
    </div>

    <script>
        // Данные игры
        const POWERS = [100, 200, 300, 400, 1000, 1500, 3000, 15000];
        const COSTS = [500, 1500, 5000, 10000, 50000, 150000, 1000000];

        let state = {
            balance: 0,
            lvl: 0,
            mult: 1
        };

        // Загрузка
        const saved = localStorage.getItem('neobank_v5_save');
        if (saved) {
            try {
                state = JSON.parse(saved);
            } catch(e) { console.error("Ошибка загрузки"); }
        }

        // Элементы
        const balanceEl = document.getElementById('ui-balance');
        const tapEl = document.getElementById('ui-tap');
        const multEl = document.getElementById('ui-mult');
        const coinBtn = document.getElementById('main-coin');
        const upgArea = document.getElementById('upgrade-area');
        const maxMsg = document.getElementById('max-msg');

        // Клик
        coinBtn.onclick = function(e) {
            let gain = POWERS[state.lvl] * state.mult;
            state.balance += gain;
            
            // Текст +X
            const p = document.createElement('div');
            p.innerText = "+" + gain;
            p.className = 'plus-one';
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            
            updateUI();
        };

        // Логика покупки
        function buy() {
            let cost = COSTS[state.lvl];
            if (state.balance >= cost) {
                state.balance -= cost;
                state.lvl++;
                updateUI();
            }
        }

        // Логика ребирта
        function rebirth(cost, m) {
            if (state.balance >= cost) {
                state.balance = 0;
                state.lvl = 0;
                state.mult = m;
                updateUI();
            }
        }

        // Обновление UI
        function updateUI() {
            balanceEl.innerText = Math.floor(state.balance).toLocaleString();
            tapEl.innerText = (POWERS[state.lvl] * state.mult).toLocaleString();
            multEl.innerText = "МНОЖИТЕЛЬ: x" + state.mult;

            // Кнопка ЛВЛ
            if (state.lvl < 7) {
                upgArea.innerHTML = `<button id="upg-btn">УЛУЧШИТЬ ДО LVL ${state.lvl + 2} (${COSTS[state.lvl].toLocaleString()} ₽)</button>`;
                const btn = document.getElementById('upg-btn');
                btn.onclick = buy;
                btn.disabled = state.balance < COSTS[state.lvl];
                maxMsg.style.display = 'none';
            } else {
                upgArea.innerHTML = "";
                maxMsg.style.display = 'block';
            }

            // Кнопки Ребирта
            const r1 = document.getElementById('rb1'), r2 = document.getElementById('rb2'), r3 = document.getElementById('rb3');
            
            r1.onclick = () => rebirth(15000, 2);
            r2.onclick = () => rebirth(50000, 3);
            r3.onclick = () => rebirth(200000, 4);

            r1.style.display = (state.mult === 1 && state.balance >= 8000) ? 'block' : 'none';
            r1.disabled = state.balance < 15000;
            
            r2.style.display = (state.mult === 2 && state.balance >= 30000) ? 'block' : 'none';
            r2.disabled = state.balance < 50000;

            r3.style.display = (state.mult === 3 && state.balance >= 120000) ? 'block' : 'none';
            r3.disabled = state.balance < 200000;

            localStorage.setItem('neobank_v5_save', JSON.stringify(state));
        }

        document.getElementById('hard-reset').onclick = function() {
            if(confirm("Сбросить всё?")) {
                localStorage.clear();
                location.reload();
            }
        };

        // Запуск
        updateUI();
    </script>
</body>
</html>
