<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoBank | Ultimate Save</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.9);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 350px;
        }

        h2 { font-size: 2rem; margin-bottom: 20px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00bd65);
            color: #052e16;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover:not(:disabled) { transform: scale(1.02); }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .rebirth-btn { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; display: none; }

        .stats-box {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .balance-value { font-size: 2rem; font-weight: bold; color: var(--primary); display: block; }
        
        .coin {
            width: 130px; height: 130px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 65px; margin: 15px auto;
            cursor: pointer; user-select: none;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            transition: 0.1s;
        }
        .coin:active { transform: scale(0.9); }

        .plus-one {
            position: absolute; color: var(--primary); font-weight: bold;
            animation: floatUp 0.8s ease-out forwards; pointer-events: none;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .reset-link { color: #ff4444; font-size: 10px; margin-top: 20px; cursor: pointer; opacity: 0.5; display: block; }
    </style>
</head>
<body>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="auth-screen" class="container">
        <h2>NeoBank</h2>
        <input type="text" id="user-name-input" placeholder="ВВЕДИТЕ ИМЯ">
        <button id="auth-submit-btn">ОТКРЫТЬ СЧЕТ</button>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="game-screen" class="container" style="display:none;">
        <div id="user-title" style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px;"></div>
        
        <div class="stats-box">
            <span style="font-size: 0.7rem; opacity: 0.6;">БАЛАНС</span>
            <span class="balance-value"><span id="val-balance">0</span> ₽</span>
            <div id="val-mult" style="color: #f093fb; font-size: 0.8rem; margin-top: 5px; font-weight: bold;"></div>
        </div>

        <div class="coin" id="tap-btn">💰</div>

        <div id="shop-area">
            <p style="font-size: 0.8rem; margin-bottom: 10px;">ДОХОД: <span id="val-per-tap" style="color: var(--primary)">100</span> ₽</p>
            
            <div id="lvl-container">
                <button id="btn-u1">LEVEL 2 (500 ₽)</button>
                <button id="btn-u2">LEVEL 3 (1500 ₽)</button>
                <button id="btn-u3">LEVEL 4 (5000 ₽)</button>
                <button id="btn-u4">LEVEL 5 (10000 ₽)</button>
                <button id="btn-u5">LEVEL 6 (50000 ₽)</button>
                <button id="btn-u6">LEVEL 7 (150000 ₽)</button>
                <button id="btn-u7">LEVEL 8 (1.000.000 ₽)</button>
            </div>
            
            <button id="btn-rb1" class="rebirth-btn">REBIRTH x2 (15000 ₽)</button>
            <button id="btn-rb2" class="rebirth-btn">REBIRTH x3 (50000 ₽)</button>
            <button id="btn-rb3" class="rebirth-btn">REBIRTH x4 (200000 ₽)</button>
            
            <div id="max-info" style="display:none; color: gold; font-weight: bold; margin-top: 15px;">MAX SYSTEM LEVEL 👑</div>
        </div>

        <span class="reset-link" id="reset-btn">СБРОСИТЬ ПРОГРЕСС</span>
    </div>

    <script>
        // Инициализация данных
        let data = {
            name: "",
            balance: 0,
            lvl: 0,
            mult: 1
        };

        const tapPowers =;
        const upgPrices =;

        // Элементы
        const authScreen = document.getElementById('auth-screen');
        const gameScreen = document.getElementById('game-screen');
        const nameInput = document.getElementById('user-name-input');
        const authBtn = document.getElementById('auth-submit-btn');

        // Проверка сохранений при загрузке
        const savedData = localStorage.getItem('neo_bank_ultimate');
        if (savedData) {
            try {
                data = JSON.parse(savedData);
                if (data.name) startBank();
            } catch(e) { console.error("Ошибка загрузки"); }
        }

        // Кнопка регистрации
        authBtn.onclick = function() {
            const val = nameInput.value.trim();
            if (val) {
                data.name = val;
                saveData();
                startBank();
            } else {
                alert("Введите ваше имя!");
            }
        };

        function startBank() {
            authScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            document.getElementById('user-title').innerText = "КЛИЕНТ: " + data.name.toUpperCase();
            refresh();
        }

        // Тап
        document.getElementById('tap-btn').onclick = function(e) {
            let power = tapPowers[data.lvl] * data.mult;
            data.balance += power;
            
            // Анимация
            const p = document.createElement('div');
            p.innerText = `+${power}`;
            p.className = 'plus-one';
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            
            refresh();
            saveData();
        };

        // Покупка уровней
        for(let i=1; i<=7; i++) {
            document.getElementById('btn-u' + i).onclick = function() {
                let cost = upgPrices[i-1];
                if (data.balance >= cost) {
                    data.balance -= cost;
                    data.lvl = i;
                    refresh();
                    saveData();
                }
            }
        }

        // Ребиртхи
        document.getElementById('btn-rb1').onclick = function() { rebirthProcess(15000, 2); };
        document.getElementById('btn-rb2').onclick = function() { rebirthProcess(50000, 3); };
        document.getElementById('btn-rb3').onclick = function() { rebirthProcess(200000, 4); };

        function rebirthProcess(price, m) {
            if (data.balance >= price) {
                data.balance = 0; data.lvl = 0; data.mult = m;
                refresh(); saveData();
            }
        }

        function refresh() {
            document.getElementById('val-balance').innerText = Math.floor(data.balance).toLocaleString();
            document.getElementById('val-per-tap').innerText = (tapPowers[data.lvl] * data.mult).toLocaleString();
            document.getElementById('val-mult').innerText = `МНОЖИТЕЛЬ: x${data.mult}`;

            // Показ кнопок уровней
            for(let i=1; i<=7; i++) {
                let b = document.getElementById('btn-u' + i);
                b.style.display = (data.lvl === i - 1) ? 'block' : 'none';
                b.disabled = data.balance < upgPrices[i-1];
            }
            document.getElementById('max-info').style.display = (data.lvl === 7) ? 'block' : 'none';

            // Показ ребиртхов
            const r1 = document.getElementById('btn-rb1'), r2 = document.getElementById('btn-rb2'), r3 = document.getElementById('btn-rb3');
            r1.style.display = (data.mult === 1 && data.balance >= 10000) ? 'block' : 'none';
            r1.disabled = data.balance < 15000;
            
            r2.style.display = (data.mult === 2 && data.balance >= 40000) ? 'block' : 'none';
            r2.disabled = data.balance < 50000;

            r3.style.display = (data.mult === 3 && data.balance >= 150000) ? 'block' : 'none';
            r3.disabled = data.balance < 200000;
        }

        function saveData() { localStorage.setItem('neo_bank_ultimate', JSON.stringify(data)); }
        
        document.getElementById('reset-btn').onclick = function() {
            if(confirm("Сбросить всё?")) { localStorage.clear(); location.reload(); }
        }
    </script>
</body>
</html>
