<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoBank | Ultra Evolution</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; --rebirth: #f093fb; }
        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; user-select: none;
        }
        .card {
            background: rgba(30, 41, 59, 0.95); padding: 30px; border-radius: 30px;
            text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6); width: 350px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .balance { font-size: 2.5rem; font-weight: 900; color: var(--primary); margin: 10px 0; text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .coin {
            width: 150px; height: 150px; background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%; margin: 25px auto; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 80px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4); transition: 0.1s;
        }
        .coin:active { transform: scale(0.92); }
        button {
            width: 100%; padding: 16px; border-radius: 15px; border: none; margin-top: 12px;
            font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s;
            font-size: 0.85rem;
        }
        .btn-upg { background: var(--primary); color: #052e16; }
        .btn-rb { background: var(--rebirth); color: white; display: none; }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        
        .plus { position: absolute; color: var(--primary); font-weight: bold; animation: float 0.8s forwards; pointer-events: none; z-index: 100; font-size: 1.5rem; }
        @keyframes float { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
        
        .reset-area { margin-top: 30px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .reset-btn { color: #ff4444; font-size: 11px; cursor: pointer; opacity: 0.5; text-decoration: underline; background: none; border: none; width: auto; padding: 0; margin: 0; text-transform: none; }
        .reset-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px;">NEOBANK TERMINAL v6.0</div>
    <div class="balance"><span id="bal">0</span> ₽</div>
    <div id="mult-info" style="color: var(--rebirth); font-size: 0.9rem; font-weight: bold; margin-bottom: 5px;"></div>
    
    <div class="coin" id="coin">💰</div>
    
    <div id="shop">
        <p style="font-size: 0.9rem; margin-bottom: 15px;">ДОХОД: <span id="tap-val" style="color: var(--primary)">100</span> ₽ / ТАП</p>
        
        <div id="upg-box"></div>
        
        <!-- Кнопки Ребиртов -->
        <button id="rb1" class="btn-rb" onclick="rebirth(15000, 2)">РЕБИРТ x2 (15 000 ₽)</button>
        <button id="rb2" class="btn-rb" onclick="rebirth(50000, 3)">РЕБИРТ x3 (50 000 ₽)</button>
        <button id="rb3" class="btn-rb" onclick="rebirth(200000, 4)">РЕБИРТ x4 (200 000 ₽)</button>
        <button id="rb4" class="btn-rb" onclick="rebirth(10000000, 10)">MEGA REBIRTH x10 (10 000 000 ₽)</button>
        
        <div id="max-msg" style="display:none; color: gold; margin-top:15px; font-weight:bold; text-shadow: 0 0 10px rgba(255,215,0,0.5);">ULTIMATE POWER REACHED 👑</div>
    </div>
    
    <div class="reset-area">
        <button class="reset-btn" onclick="fullReset()">Сбросить весь прогресс</button>
    </div>
</div>

<script>
    // 1. Константы уровней (базовые значения без множителей)
    const POWERS =;
    const COSTS =;
    
    // 2. Начальное состояние
    let game = { bal: 0, lvl: 0, mult: 1 };

    // 3. Загрузка данных
    function loadGame() {
        const saved = localStorage.getItem('neobank_v6_save');
        if (saved) {
            try {
                game = JSON.parse(saved);
            } catch (e) {
                console.error("Ошибка данных, сброс...");
                fullReset();
            }
        }
        refresh();
    }

    // 4. Логика тапа
    document.getElementById('coin').addEventListener('click', function(e) {
        let gain = POWERS[game.lvl] * game.mult;
        game.bal += gain;
        
        // Создание вылетающего текста
        const p = document.createElement('div');
        p.className = 'plus';
        p.innerText = "+" + gain.toLocaleString();
        p.style.left = e.clientX + "px";
        p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        
        refresh();
    });

    // 5. Покупка улучшения
    function buy() {
        if (game.bal >= COSTS[game.lvl]) {
            game.bal -= COSTS[game.lvl];
            game.lvl++;
            refresh();
        }
    }

    // 6. Ребирт
    function rebirth(price, m) {
        if (game.bal >= price) {
            game.bal = 0; 
            game.lvl = 0; 
            game.mult = m;
            refresh();
        }
    }

    // 7. Обновление интерфейса
    function refresh() {
        // Баланс и доход
        document.getElementById('bal').innerText = Math.floor(game.bal).toLocaleString();
        document.getElementById('tap-val').innerText = (POWERS[game.lvl] * game.mult).toLocaleString();
        document.getElementById('mult-info').innerText = "МНОЖИТЕЛЬ СИСТЕМЫ: x" + game.mult;

        // Кнопки уровней (показываем только актуальную)
        const upgBox = document.getElementById('upg-box');
        if (game.lvl < 8) {
            upgBox.innerHTML = `<button class="btn-upg" onclick="buy()">УЛУЧШИТЬ ДО LVL ${game.lvl + 2} (${COSTS[game.lvl].toLocaleString()} ₽)</button>`;
            upgBox.querySelector('button').disabled = game.bal < COSTS[game.lvl];
            document.getElementById('max-msg').style.display = 'none';
        } else {
            upgBox.innerHTML = "";
            document.getElementById('max-msg').style.display = 'block';
        }

        // Логика отображения кнопок ребирта
        const r1 = document.getElementById('rb1'), r2 = document.getElementById('rb2'), 
              r3 = document.getElementById('rb3'), r4 = document.getElementById('rb4');
        
        // Скрываем все сначала
        [r1, r2, r3, r4].forEach(r => r.style.display = 'none');

        if (game.mult === 1) {
            r1.style.display = 'block'; r1.disabled = game.bal < 15000;
        } else if (game.mult === 2) {
            r2.style.display = 'block'; r2.disabled = game.bal < 50000;
        } else if (game.mult === 3) {
            r3.style.display = 'block'; r3.disabled = game.bal < 200000;
        } else if (game.mult === 4) {
            r4.style.display = 'block'; r4.disabled = game.bal < 10000000;
        }

        // Сохранение
        localStorage.setItem('neobank_v6_save', JSON.stringify(game));
    }

    // 8. Безопасный сброс
    function fullReset() {
        if (confirm("ВНИМАНИЕ: Это полностью удалит ваш счет и все улучшения. Продолжить?")) {
            localStorage.removeItem('neobank_v6_save');
            game = { bal: 0, lvl: 0, mult: 1 };
            location.reload(); // Полная перезагрузка страницы для чистоты
        }
    }

    // Запуск игры
    loadGame();
</script>

</body>
</html>
