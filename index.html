<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Winter Ultimate x100</title>
    <style>
        :root { --p: #00ff88; --bg: #020617; --rb: #f093fb; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: white; display: flex; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; 
            user-select: none; overflow: hidden; 
        }

        #snow-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        .card { 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px);
            padding: 25px; border-radius: 35px; text-align: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); width: 340px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 10;
            position: relative;
        }

        .bal-val { font-size: 2.6rem; font-weight: 900; color: var(--p); text-shadow: 0 0 20px rgba(0,255,136,0.4); }

        .coin-btn { 
            width: 140px; height: 140px; 
            background: radial-gradient(circle, #ffd700, #ff8c00); 
            border-radius: 50%; margin: 20px auto; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 70px; box-shadow: 0 0 35px rgba(255, 215, 0, 0.4); 
            transition: 0.1s; border: 4px solid rgba(255,255,255,0.2);
        }
        .coin-btn:active { transform: scale(0.9); }

        button { 
            width: 100%; padding: 15px; border-radius: 14px; border: none; 
            margin-top: 10px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s;
        }
        .u-btn { background: var(--p); color: #052e16; }
        .r-btn { background: var(--rb); color: white; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        /* Промокод сверху справа */
        #promo-trigger {
            position: fixed; top: 20px; right: 20px;
            background: #3b82f6; padding: 10px 15px; border-radius: 12px;
            cursor: pointer; font-weight: bold; z-index: 100; font-size: 0.8rem;
        }

        /* Окно промокода */
        #promo-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; 
            justify-content: center; align-items: center; z-index: 200;
        }
        .modal-content {
            background: #1e293b; padding: 25px; border-radius: 20px;
            text-align: center; width: 280px; border: 1px solid var(--p);
        }

        input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155;
            background: rgba(0,0,0,0.5); color: white; text-align: center;
            margin: 15px 0; outline: none; box-sizing: border-box;
        }

        .plus-anim { 
            position: absolute; color: var(--p); font-weight: bold; 
            animation: fAnim 0.8s forwards; pointer-events: none; 
            font-size: 1.6rem; z-index: 100; text-shadow: 0 0 5px #000;
        }
        @keyframes fAnim { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-130px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="snow-layer"></canvas>
<div id="promo-trigger" onclick="openPromo()">🎁 ПРОМОКОД</div>

<div id="promo-modal">
    <div class="modal-content">
        <h3 style="margin:0">АКТИВАЦИЯ</h3>
        <input type="text" id="promo-input" placeholder="ВВЕДИТЕ КОД">
        <button class="u-btn" onclick="activatePromo()">ПРИМЕНИТЬ</button>
        <button style="background:transparent; color:gray; font-size:0.7rem" onclick="closePromo()">ЗАКРЫТЬ</button>
    </div>
</div>

<div class="card">
    <div style="font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px;">TELEBANK WINTER V.FINAL</div>
    
    <div class="bal-box">
        <div style="font-size: 0.7rem; opacity: 0.6;">БАЛАНС</div>
        <div class="bal-val"><span id="display-balance">0</span> ₽</div>
        <div id="display-mult" style="color: var(--rb); font-size: 0.8rem; font-weight: bold; margin-top: 5px;">МНОЖИТЕЛЬ: x1</div>
    </div>
    
    <div class="coin-btn" id="main-tap-area">🪙</div>
    
    <div id="game-shop">
        <p style="font-size: 0.8rem;">ДОХОД: <span id="display-tap" style="color: var(--p)">100</span> ₽/ТАП</p>
        <div id="lvl-slot"></div>
        <div id="rb-slot"></div>
        <div id="max-info" style="display:none; color: gold; font-weight:bold; margin-top:10px;">ULTIMATE POWER 👑</div>
    </div>
</div>

<script>
    // 1. ИГРОВЫЕ ДАННЫЕ (Починено)
    const POWERS =;
    const COSTS =;
    const REBIRTHS = [
        { c: 50000, m: 2, n: "x2" },
        { c: 250000, m: 5, n: "x5" },
        { c: 1000000, m: 10, n: "MEGA x10" },
        { c: 100000000, m: 100, n: "ULTRA x100" }
    ];

    let game = { b: 0, l: 0, m: 1, p: false };

    // Загрузка
    const saved = localStorage.getItem('tb_ultimate_vfinal');
    if (saved) game = JSON.parse(saved);

    // 2. СНЕГ
    const canvas = document.getElementById('snow-layer');
    const ctx = canvas.getContext('2d');
    let flakes = [];
    function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = res; res();
    for(let i=0; i<70; i++) flakes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, s: Math.random()*1+0.5});
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white"; ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            f.y += f.s; if(f.y > canvas.height) f.y = -10;
        });
        ctx.fill(); requestAnimationFrame(draw);
    }
    draw();

    // 3. СИСТЕМА КЛИКА
    const coin = document.getElementById('main-tap-area');
    coin.onclick = function(e) {
        let gain = POWERS[game.l] * game.m;
        game.b += gain;
        
        const anim = document.createElement('div');
        anim.className = 'plus-anim';
        anim.innerText = "+" + gain.toLocaleString();
        anim.style.left = e.clientX + "px";
        anim.style.top = e.clientY + "px";
        document.body.appendChild(anim);
        setTimeout(() => anim.remove(), 800);
        refresh();
    };

    // 4. МАГАЗИН
    function buyLvl() {
        if (game.b >= COSTS[game.l]) {
            game.b -= COSTS[game.l];
            game.l++;
            refresh();
        }
    }

    function buyRb(idx) {
        if (game.b >= REBIRTHS[idx].c) {
            game.b = 0; game.l = 0;
            game.m = REBIRTHS[idx].m;
            refresh();
        }
    }

    // 5. ПРОМОКОДЫ
    function openPromo() { document.getElementById('promo-modal').style.display = 'flex'; }
    function closePromo() { document.getElementById('promo-modal').style.display = 'none'; }

    function activatePromo() {
        const val = document.getElementById('promo-input').value.trim().toUpperCase();
        if (game.p) { alert("Уже использовано!"); return; }
        if (val === "РУБЦОВ") {
            game.b += 1000000;
            game.p = true;
            alert("Бонус 1,000,000 ₽ зачислен!");
            closePromo();
            refresh();
        } else { alert("Неверный код!"); }
    }

    // 6. ОБНОВЛЕНИЕ
    function refresh() {
        document.getElementById('display-balance').innerText = Math.floor(game.b).toLocaleString();
        document.getElementById('display-tap').innerText = (POWERS[game.l] * game.m).toLocaleString();
        document.getElementById('display-mult').innerText = "МНОЖИТЕЛЬ СИСТЕМЫ: x" + game.m;

        const lSlot = document.getElementById('lvl-slot');
        if (game.l < COSTS.length) {
            lSlot.innerHTML = `<button class="u-btn" id="up-btn" onclick="buyLvl()">LEVEL ${game.l + 2} (${COSTS[game.l].toLocaleString()} ₽)</button>`;
            document.getElementById('up-btn').disabled = game.b < COSTS[game.l];
            document.getElementById('max-info').style.display = 'none';
        } else {
            lSlot.innerHTML = "";
            document.getElementById('max-info').style.display = 'block';
        }

        const rSlot = document.getElementById('rb-slot');
        const nextRbIdx = REBIRTHS.findIndex(r => r.m > game.m);
        if (nextRbIdx !== -1) {
            const rb = REBIRTHS[nextRbIdx];
            rSlot.innerHTML = `<button class="r-btn" id="rb-btn" onclick="buyRb(${nextRbIdx})">REBIRTH ${rb.n} (${rb.c.toLocaleString()} ₽)</button>`;
            document.getElementById('rb-btn').disabled = game.b < rb.c;
        } else { rSlot.innerHTML = ""; }

        localStorage.setItem('tb_ultimate_vfinal', JSON.stringify(game));
    }

    refresh();
</script>
</body>
</html>
