<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Ultimate</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.95);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 340px;
        }

        h2 { font-size: 2rem; margin: 0 0 20px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00bd65);
            color: #052e16;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover:not(:disabled) { transform: scale(1.02); }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .rebirth-btn { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; display: none; }

        .stats-box {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .balance-value { font-size: 2rem; font-weight: bold; color: var(--primary); display: block; }
        
        .coin {
            width: 120px; height: 120px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 60px; margin: 15px auto;
            cursor: pointer; user-select: none;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            transition: 0.1s;
        }
        .coin:active { transform: scale(0.9); }

        .plus-one {
            position: absolute; color: var(--primary); font-weight: bold;
            animation: floatUp 0.8s ease-out forwards; pointer-events: none;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .reset-link { color: #ff4444; font-size: 10px; margin-top: 20px; cursor: pointer; opacity: 0.5; display: block; text-decoration: none; }
    </style>
</head>
<body>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="auth-screen" class="container">
        <h2>NeoBank</h2>
        <input type="text" id="username" placeholder="ВВЕДИТЕ ИМЯ" autocomplete="off">
        <button onclick="startApp()">ОТКРЫТЬ СЧЕТ</button>
    </div>

    <!-- ЭКРАН БАНКА -->
    <div id="game-screen" class="container" style="display:none;">
        <div id="client-name" style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px; font-weight: bold;"></div>
        
        <div class="stats-box">
            <span style="font-size: 0.7rem; opacity: 0.6;">БАЛАНС</span>
            <span class="balance-value"><span id="balance-val">0</span> ₽</span>
            <div id="multiplier-val" style="color: #f093fb; font-size: 0.8rem; margin-top: 5px; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
        </div>

        <div class="coin" onclick="handleTap(event)">🪙</div>

        <div id="shop">
            <p style="font-size: 0.8rem; margin-bottom: 10px;">ДОХОД: <span id="tap-val" style="color: var(--primary)">100</span> ₽</p>
            
            <div id="level-buttons">
                <!-- Сюда скрипт вставит кнопку текущего уровня -->
            </div>
            
            <button id="rb1" class="rebirth-btn" onclick="applyRebirth(15000, 2)">REBIRTH x2 (15000 ₽)</button>
            <button id="rb2" class="rebirth-btn" onclick="applyRebirth(50000, 3)">REBIRTH x3 (50000 ₽)</button>
            <button id="rb3" class="rebirth-btn" onclick="applyRebirth(200000, 4)">REBIRTH x4 (200000 ₽)</button>
            
            <div id="max-msg" style="display:none; color: gold; font-weight: bold; margin-top: 15px;">MAX SYSTEM LEVEL 👑</div>
        </div>

        <a class="reset-link" onclick="fullReset()">СБРОСИТЬ ПРОГРЕСС</a>
    </div>

    <script>
        // Глобальные данные
        let state = {
            name: "",
            balance: 0,
            lvl: 0,
            mult: 1
        };

        const tapPowers = [100, 200, 300, 400, 1000, 1500, 3000, 15000];
        const upgCosts = [500, 1500, 5000, 10000, 50000, 150000, 1000000];

        // Загрузка при открытии
        const saved = localStorage.getItem('neobank_v10');
        if (saved) {
            state = JSON.parse(saved);
            if (state.name) {
                renderGame();
            }
        }

        function startApp() {
            const nameVal = document.getElementById('username').value.trim();
            if (nameVal) {
                state.name = nameVal;
                saveData();
                renderGame();
            } else {
                alert("Введите имя!");
            }
        }

        function renderGame() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('client-name').innerText = "КЛИЕНТ: " + state.name.toUpperCase();
            updateUI();
        }

        function handleTap(e) {
            let gain = tapPowers[state.lvl] * state.mult;
            state.balance += gain;
            
            // Анимация +
            const p = document.createElement('div');
            p.innerText = "+" + gain;
            p.className = 'plus-one';
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            
            updateUI();
            saveData();
        }

        function buyUpgrade() {
            let cost = upgCosts[state.lvl];
            if (state.balance >= cost) {
                state.balance -= cost;
                state.lvl++;
                updateUI();
                saveData();
            }
        }

        function applyRebirth(cost, m) {
            if (state.balance >= cost) {
                state.balance = 0;
                state.lvl = 0;
                state.mult = m;
                updateUI();
                saveData();
            }
        }

        function updateUI() {
            document.getElementById('balance-val').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('tap-val').innerText = (tapPowers[state.lvl] * state.mult).toLocaleString();
            document.getElementById('multiplier-val').innerText = "МНОЖИТЕЛЬ: x" + state.mult;

            // Кнопка уровня
            const btnBox = document.getElementById('level-buttons');
            if (state.lvl < 7) {
                btnBox.innerHTML = `<button onclick="buyUpgrade()">УЛУЧШИТЬ ДО LVL ${state.lvl + 2} (${upgCosts[state.lvl].toLocaleString()} ₽)</button>`;
                btnBox.querySelector('button').disabled = state.balance < upgCosts[state.lvl];
                document.getElementById('max-msg').style.display = 'none';
            } else {
                btnBox.innerHTML = "";
                document.getElementById('max-msg').style.display = 'block';
            }

            // Ребиртхи
            const r1 = document.getElementById('rb1'), r2 = document.getElementById('rb2'), r3 = document.getElementById('rb3');
            r1.style.display = (state.mult === 1 && state.balance >= 10000) ? 'block' : 'none';
            r1.disabled = state.balance < 15000;
            
            r2.style.display = (state.mult === 2 && state.balance >= 40000) ? 'block' : 'none';
            r2.disabled = state.balance < 50000;

            r3.style.display = (state.mult === 3 && state.balance >= 150000) ? 'block' : 'none';
            r3.disabled = state.balance < 200000;
        }

        function saveData() { localStorage.setItem('neobank_v10', JSON.stringify(state)); }
        function fullReset() { if(confirm("Сбросить игру?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
