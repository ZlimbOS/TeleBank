<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoBank | Save & Evolution</title>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00bd65;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.9);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 350px;
        }

        h2 { font-size: 1.8rem; margin-bottom: 20px; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }

        input {
            width: 90%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #052e16;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover:not(:disabled) { transform: scale(1.02); }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .rebirth-btn { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; display: none; }

        .stats-box {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .balance-value { font-size: 1.8rem; font-weight: bold; color: var(--primary); display: block; }
        
        .coin {
            width: 130px; height: 130px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 65px; margin: 15px auto;
            cursor: pointer; user-select: none;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            transition: 0.1s;
        }
        .coin:active { transform: scale(0.9); }

        .plus-one {
            position: absolute; color: var(--primary); font-weight: bold;
            animation: floatUp 0.8s ease-out forwards; pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .reset-btn { background: none; color: #ff4444; font-size: 10px; margin-top: 20px; cursor: pointer; border: none; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="reg-screen" class="container">
        <h2>NeoBank</h2>
        <input type="text" id="username" placeholder="ИМЯ КЛИЕНТА">
        <button onclick="register()">ОТКРЫТЬ СЧЕТ</button>
    </div>

    <div id="game-screen" class="container" style="display:none;">
        <div id="client-id" style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px;"></div>
        
        <div class="stats-box">
            <span style="font-size: 0.7rem; opacity: 0.6;">БАЛАНС</span>
            <span class="balance-value"><span id="balance">0</span> ₽</span>
            <div id="mult-tag" style="color: #f093fb; font-size: 0.8rem; margin-top: 5px; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
        </div>

        <div class="coin" onclick="tap(event)">🪙</div>

        <div id="upgrades">
            <p style="font-size: 0.8rem; margin-bottom: 10px;">ДОХОД: <span id="per-tap" style="color: var(--primary)">100</span> ₽</p>
            
            <div id="lvl-buttons">
                <button id="u1" onclick="buyUpg(1, 500)">LVL 2 (500 ₽)</button>
                <button id="u2" onclick="buyUpg(2, 1500)">LVL 3 (1500 ₽)</button>
                <button id="u3" onclick="buyUpg(3, 5000)">LVL 4 (5000 ₽)</button>
                <button id="u4" onclick="buyUpg(4, 10000)">LVL 5 (10000 ₽)</button>
                <button id="u5" onclick="buyUpg(5, 50000)">LVL 6 (50000 ₽)</button>
                <button id="u6" onclick="buyUpg(6, 150000)">LVL 7 (150000 ₽)</button>
                <button id="u7" onclick="buyUpg(7, 1000000)">LVL 8 (1.000.000 ₽)</button>
            </div>
            
            <button id="rb1" class="rebirth-btn" onclick="doRebirth(15000, 2)">REBIRTH x2 (15000 ₽)</button>
            <button id="rb2" class="rebirth-btn" onclick="doRebirth(50000, 3)">REBIRTH x3 (50000 ₽)</button>
            <button id="rb3" class="rebirth-btn" onclick="doRebirth(200000, 4)">REBIRTH x4 (200000 ₽)</button>
            
            <div id="max-lvl" style="display:none; color: gold; font-weight: bold; margin-top: 15px;">MAX LEVEL REACHED 👑</div>
        </div>

        <button class="reset-btn" onclick="resetGame()">Сбросить прогресс</button>
    </div>

    <script>
        let game = { name: "", balance: 0, lvl: 0, multiplier: 1 };
        
        const powers =;
        const costs =;

        window.onload = function() {
            const saved = localStorage.getItem('neoBankSave_v2');
            if (saved) {
                game = JSON.parse(saved);
                if (game.name) showGame();
            }
        };

        function save() { localStorage.setItem('neoBankSave_v2', JSON.stringify(game)); }

        function register() {
            const input = document.getElementById('username').value.trim();
            if (input) { game.name = input; showGame(); save(); }
        }

        function showGame() {
            document.getElementById('reg-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('client-id').innerText = "КЛИЕНТ: " + game.name.toUpperCase();
            updateUI();
        }

        function tap(e) {
            let gain = powers[game.lvl] * game.multiplier;
            game.balance += gain;
            
            const plus = document.createElement('div');
            plus.innerText = `+${gain}`;
            plus.className = 'plus-one';
            plus.style.left = e.clientX + 'px';
            plus.style.top = e.clientY + 'px';
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 800);
            
            updateUI();
            save();
        }

        function buyUpg(newLvl, price) {
            if (game.balance >= price) {
                game.balance -= price;
                game.lvl = newLvl;
                updateUI();
                save();
            }
        }

        function doRebirth(price, mult) {
            if (game.balance >= price) {
                game.balance = 0;
                game.lvl = 0;
                game.multiplier = mult;
                updateUI();
                save();
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(game.balance).toLocaleString();
            document.getElementById('per-tap').innerText = (powers[game.lvl] * game.multiplier).toLocaleString();
            document.getElementById('mult-tag').innerText = `МНОЖИТЕЛЬ: x${game.multiplier}`;

            // Уровни: показываем только следующую покупку
            for (let i = 1; i <= 7; i++) {
                let btn = document.getElementById('u' + i);
                btn.style.display = (game.lvl === i - 1) ? 'block' : 'none';
                btn.disabled = game.balance < costs[i - 1];
            }
            document.getElementById('max-lvl').style.display = (game.lvl === 7) ? 'block' : 'none';

            // Ребиртхи: логика появления
            const r1 = document.getElementById('rb1'), r2 = document.getElementById('rb2'), r3 = document.getElementById('rb3');
            
            r1.style.display = (game.multiplier === 1 && game.balance >= 10000) ? 'block' : 'none';
            r1.disabled = game.balance < 15000;
            
            r2.style.display = (game.multiplier === 2 && game.balance >= 40000) ? 'block' : 'none';
            r2.disabled = game.balance < 50000;

            r3.style.display = (game.multiplier === 3 && game.balance >= 150000) ? 'block' : 'none';
            r3.disabled = game.balance < 200000;
        }

        function resetGame() {
            if (confirm("Удалить всё?")) { localStorage.clear(); location.reload(); }
        }
    </script>
</body>
</html>
