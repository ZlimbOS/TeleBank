<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoBank Ultimate</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; }
        body {
            font-family: sans-serif; background: var(--bg); color: white;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; user-select: none;
        }
        .card {
            background: rgba(30, 41, 59, 0.9); padding: 30px; border-radius: 25px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 340px;
        }
        .balance { font-size: 2.5rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .coin {
            width: 140px; height: 140px; background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%; margin: 20px auto; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 70px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); transition: 0.1s;
        }
        .coin:active { transform: scale(0.9); }
        button {
            width: 100%; padding: 15px; border-radius: 12px; border: none; margin-top: 10px;
            font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-upg { background: var(--primary); color: #052e16; }
        .btn-rb { background: #f093fb; color: white; display: none; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }
        .plus { position: absolute; color: var(--primary); font-weight: bold; animation: float 0.8s forwards; pointer-events: none; }
        @keyframes float { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 0.8rem; opacity: 0.5;">NEOBANK TERMINAL v5.0</div>
    <div class="balance"><span id="bal">0</span> ₽</div>
    <div id="mult-info" style="color: #f093fb; font-size: 0.9rem; margin-bottom: 10px;">Множитель: x1</div>
    
    <div class="coin" id="coin">💰</div>
    
    <div id="shop">
        <p style="font-size: 0.9rem;">Доход: <span id="tap-val">100</span> ₽/клик</p>
        <div id="upg-box"></div>
        <button id="rb1" class="btn-rb" onclick="rebirth(15000, 2)">РЕБИРТ x2 (15000 ₽)</button>
        <button id="rb2" class="btn-rb" onclick="rebirth(50000, 3)">РЕБИРТ x3 (50000 ₽)</button>
        <button id="rb3" class="btn-rb" onclick="rebirth(200000, 4)">РЕБИРТ x4 (200000 ₽)</button>
        <div id="max-msg" style="display:none; color: gold; margin-top:15px; font-weight:bold;">MAX LEVEL REACHED 👑</div>
    </div>
    
    <div style="margin-top: 20px; font-size: 10px; opacity: 0.3; cursor: pointer;" onclick="localStorage.clear(); location.reload();">СБРОСИТЬ ВСЁ</div>
</div>

<script>
    // 1. Данные
    const POWERS =;
    const COSTS =;
    
    let game = { bal: 0, lvl: 0, mult: 1 };

    // 2. Загрузка
    const saved = localStorage.getItem('nb_save_final');
    if (saved) game = JSON.parse(saved);

    // 3. Тап (Работает везде)
    document.getElementById('coin').addEventListener('click', function(e) {
        let gain = POWERS[game.lvl] * game.mult;
        game.bal += gain;
        
        // Эффект цифр
        const p = document.createElement('div');
        p.className = 'plus';
        p.innerText = "+" + gain;
        p.style.left = e.clientX + "px";
        p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        
        refresh();
    });

    // 4. Покупка
    function buy() {
        if (game.bal >= COSTS[game.lvl]) {
            game.bal -= COSTS[game.lvl];
            game.lvl++;
            refresh();
        }
    }

    // 5. Ребирт
    function rebirth(price, m) {
        if (game.bal >= price) {
            game.bal = 0; game.lvl = 0; game.mult = m;
            refresh();
        }
    }

    // 6. Обновление экрана
    function refresh() {
        document.getElementById('bal').innerText = Math.floor(game.bal).toLocaleString();
        document.getElementById('tap-val').innerText = (POWERS[game.lvl] * game.mult).toLocaleString();
        document.getElementById('mult-info').innerText = "Множитель: x" + game.mult;

        // Кнопка уровня
        const upgBox = document.getElementById('upg-box');
        if (game.lvl < 7) {
            upgBox.innerHTML = `<button class="btn-upg" onclick="buy()">УЛУЧШИТЬ ДО LVL ${game.lvl + 2} (${COSTS[game.lvl]} ₽)</button>`;
            upgBox.querySelector('button').disabled = game.bal < COSTS[game.lvl];
            document.getElementById('max-msg').style.display = 'none';
        } else {
            upgBox.innerHTML = "";
            document.getElementById('max-msg').style.display = 'block';
        }

        // Ребиртхи
        const r1 = document.getElementById('rb1'), r2 = document.getElementById('rb2'), r3 = document.getElementById('rb3');
        r1.style.display = (game.mult === 1 && game.bal >= 10000) ? 'block' : 'none';
        r1.disabled = game.bal < 15000;
        r2.style.display = (game.mult === 2 && game.bal >= 40000) ? 'block' : 'none';
        r2.disabled = game.bal < 50000;
        r3.style.display = (game.mult === 3 && game.bal >= 150000) ? 'block' : 'none';
        r3.disabled = game.bal < 200000;

        localStorage.setItem('nb_save_final', JSON.stringify(game));
    }

    refresh(); // Запуск при старте
</script>

</body>
</html>
