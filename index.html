<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Premium Systems</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #ffffff;
            --border: #1a1a1a;
            --muted: #555555;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container { 
            width: 360px; 
            padding: 40px; 
            border: 1px solid var(--border); 
        }

        h1 { font-size: 24px; font-weight: 900; margin: 0; letter-spacing: 4px; }
        .tagline { color: var(--muted); font-size: 9px; margin-bottom: 40px; }

        input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            padding: 15px;
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            font-size: 11px;
        }

        /* Стиль кнопок со скриншота: Белый фон, черный жирный текст */
        .btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 14px;
            font-weight: 900;
            font-size: 11px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn:hover { opacity: 0.8; }
        .btn:disabled { background: #111; color: #333; cursor: not-allowed; }

        .rebirth-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            margin-top: 25px;
        }

        .stats { border-top: 1px solid var(--border); margin-top: 30px; padding-top: 20px; }
        .label { color: var(--muted); font-size: 8px; margin-bottom: 5px; }
        .value { font-size: 18px; font-weight: bold; margin-bottom: 15px; }

        .tap-area {
            height: 120px;
            border: 1px solid var(--border);
            margin: 25px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            cursor: pointer;
            user-select: none;
        }
        .tap-area:active { background: #080808; transform: scale(0.98); }

        .footer { margin-top: 40px; color: #222; font-size: 8px; }
    </style>
</head>
<body>

    <!-- ВХОД -->
    <div id="auth-screen" class="container">
        <h1>TELEBANK</h1>
        <p class="tagline">PREMIUM TERMINAL ACCESS</p>
        <input type="text" id="user-name" placeholder="CLIENT NAME...">
        <button class="btn" onclick="login()">INITIALIZE</button>
    </div>

    <!-- БАНК -->
    <div id="bank-screen" class="container" style="display:none;">
        <h1 id="client-name">CLIENT</h1>
        <p class="tagline">REBIRTHS: <span id="reb-count">0</span> | 2026 EDITION</p>

        <div class="stats">
            <div class="label">ASSETS</div>
            <div class="value"><span id="balance">0</span> RUB</div>
            
            <div class="label">POWER</div>
            <div class="value">+<span id="power-display">100</span> / TAP</div>
        </div>

        <div class="tap-area" onclick="handleTap()">🪙</div>

        <div id="shop">
            <div class="label">HARDWARE UPGRADES</div>
            <button id="lvl1" class="btn" onclick="buy(1, 500)">LVL 2: 500 RUB</button>
            <button id="lvl2" class="btn" style="display:none" onclick="buy(2, 1500)">LVL 3: 1500 RUB</button>
            <button id="lvl3" class="btn" style="display:none" onclick="buy(3, 5000)">LVL 4: 5000 RUB</button>
            <div id="max-msg" style="display:none; text-align:center; font-size:9px; color:var(--muted); margin:15px 0;">MAX CONFIGURATION</div>
        </div>

        <button id="reb-btn" class="btn rebirth-btn" style="display:none" onclick="doRebirth()">SYSTEM REBIRTH (15000 RUB)</button>

        <div class="footer">TELEBANK PREMIUM BUILDS. ALL RIGHTS RESERVED.</div>
    </div>

    <script>
        let balance = 0;
        let currentLvl = 0;
        let rebirths = 0;
        
        // База: 100, 200, 300, 400
        const basePowers = [100, 200, 300, 400];

        function login() {
            const val = document.getElementById('user-name').value;
            if(val) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('bank-screen').style.display = 'block';
                document.getElementById('client-name').innerText = val;
                refreshUI();
            }
        }

        function handleTap() {
            // Математика: База * (ребирты + 1)
            // 0 ребиртов: 100, 200, 300, 400
            // 1 ребирт: 200, 400, 600, 800
            balance += basePowers[currentLvl] * (rebirths + 1);
            refreshUI();
        }

        function buy(nextLvl, cost) {
            if(balance >= cost) {
                balance -= cost;
                currentLvl = nextLvl;
                refreshUI();
            }
        }

        function doRebirth() {
            if(balance >= 15000) {
                balance = 0;
                currentLvl = 0;
                rebirths++;
                refreshUI();
            }
        }

        function refreshUI() {
            const multiplier = rebirths + 1;
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('power-display').innerText = basePowers[currentLvl] * multiplier;
            document.getElementById('reb-count').innerText = rebirths;

            // Кнопки магазина
            document.getElementById('lvl1').style.display = currentLvl === 0 ? 'block' : 'none';
            document.getElementById('lvl2').style.display = currentLvl === 1 ? 'block' : 'none';
            document.getElementById('lvl3').style.display = currentLvl === 2 ? 'block' : 'none';
            document.getElementById('max-msg').style.display = currentLvl === 3 ? 'block' : 'none';

            // Проверка денег
            document.getElementById('lvl1').disabled = balance < 500;
            document.getElementById('lvl2').disabled = balance < 1500;
            document.getElementById('lvl3').disabled = balance < 5000;

            // Кнопка ребирта
            const rbBtn = document.getElementById('reb-btn');
            rbBtn.style.display = (balance >= 10000 || rebirths > 0) ? 'block' : 'none';
            rbBtn.disabled = balance < 15000;
        }
    </script>
</body>
</html>
