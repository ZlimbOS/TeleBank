<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Neo Edition</title>
    <style>
        :root { --p: #00ff88; --bg: #0f172a; --rb: #f093fb; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; user-select: none; overflow: hidden; }
        .card { background: rgba(30, 41, 59, 0.95); padding: 30px; border-radius: 30px; text-align: center; box-shadow: 0 20px 60px #000; width: 350px; border: 1px solid rgba(255,255,255,0.1); }
        .bal { font-size: 2.4rem; font-weight: 900; color: var(--p); margin: 10px 0; text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .coin { width: 140px; height: 140px; background: linear-gradient(135deg, #ffd700, #ff8c00); border-radius: 50%; margin: 20px auto; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 70px; box-shadow: 0 0 40px rgba(255, 215, 0, 0.4); transition: 0.1s; }
        .coin:active { transform: scale(0.9); }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; margin-top: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .u-btn { background: var(--p); color: #052e16; }
        .r-btn { background: var(--rb); color: white; }
        button:disabled { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }
        .plus { position: absolute; color: var(--p); font-weight: bold; animation: f 0.8s forwards; pointer-events: none; font-size: 1.5rem; }
        @keyframes f { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
        .res { margin-top: 25px; color: #ff4444; font-size: 11px; cursor: pointer; opacity: 0.5; background: none; border: none; width: auto; text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px;">TELEBANK ULTIMATE v7.0</div>
    <div class="bal"><span id="b">0</span> ₽</div>
    <div id="m-info" style="color: var(--rb); font-size: 0.9rem; font-weight: bold; margin-bottom: 5px;">МНОЖИТЕЛЬ: x1</div>
    
    <div class="coin" id="c">🪙</div>
    
    <div id="shop">
        <p style="font-size: 0.9rem;">ДОХОД: <span id="t" style="color: var(--p)">100</span> ₽/ТАП</p>
        <div id="u-area"></div>
        <div id="r-area"></div>
        <div id="mx" style="display:none; color: gold; margin-top:15px; font-weight:bold;">MAX LEVEL REACHED 👑</div>
    </div>
    
    <button class="res" onclick="fullReset()">Сбросить прогресс</button>
</div>

<script>
    // Математика (Твоё ТЗ)
    const POWERS = [100, 200, 300, 400, 1000, 1500, 3000, 15000, 35000];
    const COSTS = [500, 1500, 5000, 10000, 50000, 150000, 1000000, 2500000];
    const REBIRTHS = [
        { c: 15000, m: 2, n: "x2" },
        { c: 50000, m: 3, n: "x3" },
        { c: 200000, m: 4, n: "x4" },
        { c: 10000000, m: 10, n: "MEGA x10" }
    ];

    let game = { b: 0, l: 0, m: 1 };

    // Загрузка
    const s = localStorage.getItem('tb_final_v7');
    if (s) game = JSON.parse(s);

    // Тап
    document.getElementById('c').onclick = function(e) {
        let gain = POWERS[game.l] * game.m;
        game.b += gain;
        
        const p = document.createElement('div');
        p.className = 'plus';
        p.innerText = "+" + gain.toLocaleString();
        p.style.left = e.clientX + "px";
        p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        
        refresh();
    };

    function buy() {
        if (game.b >= COSTS[game.l]) {
            game.b -= COSTS[game.l];
            game.l++;
            refresh();
        }
    }

    function doRb(idx) {
        let r = REBIRTHS[idx];
        if (game.b >= r.c) {
            game.b = 0; game.l = 0; game.m = r.m;
            refresh();
        }
    }

    function refresh() {
        // Баланс
        document.getElementById('b').innerText = Math.floor(game.b).toLocaleString();
        document.getElementById('t').innerText = (POWERS[game.l] * game.m).toLocaleString();
        document.getElementById('m-info').innerText = "МНОЖИТЕЛЬ СИСТЕМЫ: " + 
            (REBIRTHS.find(r => r.m === game.m)?.n || "x1");

        // Кнопка уровня
        const ua = document.getElementById('u-area');
        if (game.l < 8) {
            ua.innerHTML = `<button class="u-btn" onclick="buy()">LEVEL ${game.l + 2} (${COSTS[game.l].toLocaleString()} ₽)</button>`;
            ua.querySelector('button').disabled = game.b < COSTS[game.l];
            document.getElementById('mx').style.display = 'none';
        } else {
            ua.innerHTML = "";
            document.getElementById('mx').style.display = 'block';
        }

        // Кнопка ребиртха
        const ra = document.getElementById('r-area');
        let nextRbIdx = REBIRTHS.findIndex(r => r.m > game.m);
        if (nextRbIdx !== -1) {
            let r = REBIRTHS[nextRbIdx];
            ra.innerHTML = `<button class="r-btn" onclick="doRb(${nextRbIdx})">REBIRTH ${r.n} (${r.c.toLocaleString()} ₽)</button>`;
            ra.querySelector('button').disabled = game.b < r.c;
        } else {
            ra.innerHTML = "";
        }

        localStorage.setItem('tb_final_v7', JSON.stringify(game));
    }

    function fullReset() {
        if (confirm("УДАЛИТЬ ВСЁ?")) {
            localStorage.clear();
            location.reload();
        }
    }

    refresh();
</script>
</body>
</html>
