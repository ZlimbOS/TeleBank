<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoBank Clicker | Evolution</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 320px;
        }

        h2 { font-size: 1.5rem; margin-bottom: 20px; color: var(--primary); }

        input {
            width: 90%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00bd65);
            color: #052e16;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover:not(:disabled) { transform: translateY(-2px); }
        button:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        .rebirth-btn { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }

        .stats-box {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .balance-value { font-size: 1.8rem; font-weight: bold; color: var(--primary); display: block; }
        
        .coin {
            width: 140px; height: 140px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 70px; margin: 20px auto;
            cursor: pointer; user-select: none;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            transition: 0.05s;
        }
        .coin:active { transform: scale(0.92); }

        .plus-one {
            position: absolute; color: var(--primary); font-weight: bold;
            animation: floatUp 0.8s ease-out forwards; pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- РЕГИСТРАЦИЯ -->
    <div id="reg-screen" class="container">
        <h2>NeoBank</h2>
        <input type="text" id="username" placeholder="Ваше имя">
        <button onclick="register()">ОТКРЫТЬ СЧЁТ</button>
    </div>

    <!-- ИГРА -->
    <div id="game-screen" class="container" style="display:none;">
        <div id="welcome" style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 10px;">ЛИЧНЫЙ КАБИНЕТ</div>
        
        <div class="stats-box">
            <span style="font-size: 0.7rem; opacity: 0.7;">БАЛАНС</span>
            <span class="balance-value"><span id="balance">0</span> ₽</span>
            <div id="mult-tag" style="color: #f093fb; font-size: 0.8rem; margin-top: 5px;">МНОЖИТЕЛЬ: x1</div>
        </div>

        <div class="coin" onclick="tap(event)">💰</div>

        <div id="upgrades">
            <p style="font-size: 0.8rem;">За тап: <span id="per-tap">100</span> ₽</p>
            
            <button id="u1" onclick="upgrade(1, 500)">УЛУЧШИТЬ ДО LVL 2 (500 ₽)</button>
            <button id="u2" onclick="upgrade(2, 1500)" style="display:none;">УЛУЧШИТЬ ДО LVL 3 (1500 ₽)</button>
            <button id="u3" onclick="upgrade(3, 5000)" style="display:none;">УЛУЧШИТЬ ДО LVL 4 (5000 ₽)</button>
            <button id="u4" onclick="upgrade(4, 10000)" style="display:none;">УЛУЧШИТЬ ДО LVL 5 (10000 ₽)</button>
            <button id="u5" onclick="upgrade(5, 50000)" style="display:none;">УЛУЧШИТЬ ДО LVL 6 (50000 ₽)</button>
            
            <button id="rb1" class="rebirth-btn" onclick="rebirth(15000, 2)" style="display:none;">РЕБИРТ x2 (15000 ₽)</button>
            <button id="rb2" class="rebirth-btn" onclick="rebirth(50000, 3)" style="display:none;">РЕБИРТ x3 (50000 ₽)</button>
            
            <div id="max-lvl" style="display:none; color: gold; font-weight: bold; margin-top: 10px;">MAX LEVEL REACHED 👑</div>
        </div>
    </div>

    <script>
        let balance = 0;
        let currentLvl = 0;
        let multiplier = 1;

        // Базовые значения силы клика
        const basePowers = [100, 200, 300, 400, 1000, 1500];
        const upgCosts = [500, 1500, 5000, 10000, 50000];

        function register() {
            const name = document.getElementById('username').value;
            if (name.trim() !== "") {
                document.getElementById('reg-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                document.getElementById('welcome').innerText = "КЛИЕНТ: " + name.toUpperCase();
                updateUI();
            } else {
                alert("Введите имя!");
            }
        }

        function tap(event) {
            let gain = basePowers[currentLvl] * multiplier;
            balance += gain;
            
            // Анимация цифр
            const plus = document.createElement('div');
            plus.innerText = `+${gain}`;
            plus.className = 'plus-one';
            plus.style.left = `${event.clientX}px`;
            plus.style.top = `${event.clientY}px`;
            plus.style.position = 'fixed';
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 800);
            
            updateUI();
        }

        function upgrade(lvl, cost) {
            if (balance >= cost) {
                balance -= cost;
                currentLvl = lvl;
                updateUI();
            }
        }

        function rebirth(cost, newMult) {
            if (balance >= cost) {
                balance = 0;
                currentLvl = 0;
                multiplier = newMult;
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('per-tap').innerText = (basePowers[currentLvl] * multiplier).toLocaleString();
            document.getElementById('mult-tag').innerText = `МНОЖИТЕЛЬ: x${multiplier}`;

            // Показываем нужную кнопку уровня
            for(let i=1; i<=5; i++) {
                let btn = document.getElementById('u' + i);
                btn.style.display = (currentLvl === i-1) ? 'block' : 'none';
                if (currentLvl === i-1) btn.disabled = balance < upgCosts[i-1];
            }

            // Максимальный уровень
            document.getElementById('max-lvl').style.display = (currentLvl === 5) ? 'block' : 'none';

            // Логика кнопок ребирта
            const rb1 = document.getElementById('rb1');
            const rb2 = document.getElementById('rb2');

            if (multiplier === 1) {
                rb1.style.display = 'block';
                rb1.disabled = balance < 15000;
                rb2.style.display = 'none';
            } else if (multiplier === 2) {
                rb1.style.display = 'none';
                rb2.style.display = 'block';
                rb2.disabled = balance < 50000;
            } else {
                rb1.style.display = 'none';
                rb2.style.display = 'none';
            }
        }
    </script>
</body>
</html>
