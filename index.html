<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Season 2 Ultra Admin Pro</title>
    <style>
        :root { --p: #00ff88; --bg: #030712; --rb: #f093fb; --accent: #ff3e3e; --gold: #ffd700; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: white; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; 
            user-select: none; overflow: hidden; 
        }
        #snow-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        .season-header {
            font-size: 2.5rem; font-weight: 900; color: #ffffff;
            text-transform: uppercase; letter-spacing: 8px; margin-bottom: 15px;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.5); z-index: 10;
        }

        .card { 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 30px; text-align: center; 
            box-shadow: 0 0 100px rgba(0,255,136,0.1); width: 340px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }
        .money-val { font-size: 1.8rem; font-weight: 900; color: var(--p); margin: 10px 0; text-shadow: 0 0 20px rgba(0,255,136,0.4); }
        
        .coin-btn { 
            width: 130px; height: 130px; 
            background: radial-gradient(circle, #ffd700, #ff8c00); 
            border-radius: 50%; margin: 20px auto; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 65px; box-shadow: 0 0 50px rgba(255, 165, 0, 0.3); 
            transition: 0.05s; border: 5px solid rgba(255,255,255,0.2);
            position: relative; z-index: 20;
        }
        .coin-btn:active { transform: scale(0.9); }
        .coin-btn.wait { opacity: 0.7; pointer-events: none; }

        button.game-btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            margin-top: 10px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s;
        }
        .u-btn { background: var(--p); color: #000; box-shadow: 0 4px 0 #009b52; }
        .r-btn { background: var(--rb); color: white; box-shadow: 0 4px 0 #b56dbf; }
        button:active { transform: translateY(2px); box-shadow: none; }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        
        /* КРАСИВАЯ АДМИН ПАНЕЛЬ */
        #admin-panel {
            display: none; position: fixed; top: 50%; left: 5%; transform: translateY(-50%);
            background: rgba(10, 15, 30, 0.98); backdrop-filter: blur(30px);
            border: 2px solid var(--gold); padding: 25px;
            border-radius: 28px; z-index: 500; width: 280px; text-align: center;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.25);
            animation: panelFade 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes panelFade { from { left: -350px; opacity: 0; } to { left: 5%; opacity: 1; } }

        .adm-header { font-size: 0.8rem; color: var(--gold); letter-spacing: 3px; font-weight: 900; margin-bottom: 15px; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; }
        .adm-label { font-size: 0.65rem; color: #9ca3af; text-align: left; display: block; margin: 10px 0 2px 5px; text-transform: uppercase; }
        
        .admin-input { 
            width: 100%; padding: 12px; border-radius: 10px; 
            border: 1px solid #374151; background: #030712; color: #fff; 
            outline: none; box-sizing: border-box; text-align: center; font-weight: bold;
            transition: 0.3s;
        }
        .admin-input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        
        .adm-set-btn { 
            width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--gold); 
            background: none; color: var(--gold); font-size: 0.7rem; font-weight: 900;
            cursor: pointer; transition: 0.2s; margin-top: 5px;
        }
        .adm-set-btn:hover { background: var(--gold); color: #000; }

        .admin-toggle { 
            position: absolute; bottom: 20px; left: 20px; opacity: 0.1; 
            cursor: pointer; font-size: 1.4rem; z-index: 100; transition: 0.5s;
        }
        .admin-toggle:hover { opacity: 0.8; transform: rotate(180deg); }

        .plus { 
            position: absolute; color: var(--p); font-weight: bold; 
            animation: moveUp 0.4s forwards; pointer-events: none; 
            font-size: 1.2rem; z-index: 150; text-shadow: 0 0 5px #000;
        }
        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-80px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="snow-box"></canvas>
<div class="season-header">СЕЗОН 2</div>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px;">TELEBANK ULTIMATE</div>
    <div class="money-val" id="bal">0 ₽</div>
    <div id="m-info" style="color: var(--rb); font-size: 0.9rem; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
    <div class="coin-btn" id="coin">🪙</div>
    <div id="shop">
        <p style="font-size: 0.85rem;"><span id="inc-lbl">ДОХОД:</span> <span id="inc-val" style="color: var(--p)">100</span> ₽</p>
        <div id="u-area"></div>
        <div id="r-area"></div>
    </div>
</div>

<!-- Скрытая шестеренка -->
<div class="admin-toggle" onclick="openAdmin()">⚙️</div>

<!-- Новая админ-панель -->
<div id="admin-panel">
    <div class="adm-header">ADMIN DASHBOARD</div>
    
    <div style="text-align: left;">
        <span class="adm-label">Установить баланс</span>
        <input type="text" id="adm-money" class="admin-input" placeholder="Напр. 1000000">
        <button class="adm-set-btn" onclick="admSetMoney()">ПРИМЕНИТЬ БАЛАНС</button>

        <span class="adm-label">Установить уровень (1-13)</span>
        <input type="number" id="adm-lvl" class="admin-input" placeholder="Уровень">
        <button class="adm-set-btn" onclick="admSetLvl()">УСТАНОВИТЬ УРОВЕНЬ</button>

        <span class="adm-label">Установить множитель (x)</span>
        <input type="text" id="adm-mult" class="admin-input" placeholder="Множитель">
        <button class="adm-set-btn" onclick="admSetMult()">УСТАНОВИТЬ X</button>
    </div>

    <button class="game-btn" style="background: #ef4444; color: white; margin-top: 25px; height: 40px; padding: 0;" onclick="closeAdmin()">ЗАКРЫТЬ</button>
</div>

<script>
    const POWERS = [100n, 200n, 400n, 1000n, 5000n, 20000n, 100000n, 500000n, 1000000n, 2000000n, 600000000n, 2000000000n, 2000000000n * 1000n];
    const COSTS = [1000n, 5000n, 20000n, 100000n, 1000000n, 10000000n, 100000000n, 1000000000n, 10000000000n, 100000000000n, 15000000000000000n];
    const REBIRTHS = [
        { c: 1000000n, m: 10n, n: "x10" },
        { c: 1000000000n, m: 100n, n: "x100" },
        { c: 2000000000000n, m: 400n, n: "x400" },
        { c: 2000000000000000n, m: 5000n, n: "OMEGA x5000" } 
    ];

    let state = { b: 0n, l: 0, m: 1n };
    let wait = false;
    const SAVE_KEY = 'telebank_s2_pro_final_v1';

    function load() {
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) {
            try {
                const d = JSON.parse(saved);
                state.b = BigInt(d.b); state.l = d.l; state.m = BigInt(d.m);
            } catch(e) {}
        }
        refresh();
    }
    function save() {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
            b: state.b.toString(), l: state.l, m: state.m.toString()
        }));
    }

    function f(n) {
        let num = BigInt(n);
        if (num >= 1e15) return (Number(num / 1000000000000n) / 1000).toFixed(2) + " КВАДР";
        if (num >= 1e12) return (Number(num / 1000000000n) / 1000).toFixed(2) + " ТРЛН";
        if (num >= 1e9) return (Number(num / 1000000n) / 1000).toFixed(2) + " МЛРД";
        if (num >= 1e6) return (Number(num / 1000n) / 1000).toFixed(1) + " МЛН";
        return num.toLocaleString();
    }

    function getP() { return POWERS[state.l] * state.m; }

    // --- АДМИН-ЛОГИКА ---
    function openAdmin() {
        if (prompt("ADMIN ACCESS KEY:") === "67SIXSEVENADMINPANEL") {
            document.getElementById('admin-panel').style.display = 'block';
        }
    }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    
    function admSetMoney() {
        let v = document.getElementById('adm-money').value;
        if(v !== "") {
            try {
                state.b = BigInt(v);
                refresh(); save();
                alert("Баланс установлен на: " + f(state.b));
            } catch(e) { alert("Ошибка: введите число"); }
        }
    }
    
    function admSetLvl() {
        let v = parseInt(document.getElementById('adm-lvl').value);
        if(v >= 1 && v <= POWERS.length) {
            state.l = v - 1;
            refresh(); save();
            alert("Уровень установлен на: " + v);
        }
    }
    
    function admSetMult() {
        let v = document.getElementById('adm-mult').value;
        if(v !== "") {
            try {
                state.m = BigInt(v);
                refresh(); save();
                alert("Множитель установлен на: x" + v);
            } catch(e) { alert("Ошибка: введите число"); }
        }
    }

    // --- ИГРОВАЯ ЛОГИКА ---
    setInterval(() => { if (state.l >= 9) { state.b += getP(); refresh(); save(); } }, 1000);

    document.getElementById('coin').onclick = (e) => {
        if (wait) return;
        wait = true;
        state.b += getP();
        const c = document.getElementById('coin');
        c.classList.add('wait');
        setTimeout(() => { wait = false; c.classList.remove('wait'); }, 100);

        const anim = document.createElement('div');
        anim.className = 'plus';
        anim.innerText = "+" + f(getP());
        anim.style.left = e.clientX + "px"; anim.style.top = e.clientY + "px";
        document.body.appendChild(anim);
        setTimeout(() => anim.remove(), 400);
        refresh(); save();
    };

    window.buyL = () => { if (state.b >= COSTS[state.l]) { state.b -= COSTS[state.l]; state.l++; save(); refresh(); } };
    window.buyR = (i) => { if (state.b >= REBIRTHS[i].c) { state.b = 0n; state.l = 0; state.m = REBIRTHS[i].m; save(); refresh(); } };

    function refresh() {
        document.getElementById('bal').innerText = f(state.b) + " ₽";
        document.getElementById('m-info').innerText = "МНОЖИТЕЛЬ: x" + state.m;
        let isA = state.l >= 9;
        document.getElementById('inc-val').innerText = f(getP()) + (isA ? " /СЕК" : " /ТАП");
        
        const uA = document.getElementById('u-area');
        if (state.l < COSTS.length) {
            uA.innerHTML = `<button class="game-btn u-btn" onclick="buyL()" ${state.b < COSTS[state.l] ? 'disabled' : ''}>УЛУЧШИТЬ: ${f(COSTS[state.l])} ₽</button>`;
        } else uA.innerHTML = "<div style='color:gold; font-weight:bold; margin-top:10px;'>MAX LEVEL 👑</div>";
        
        const rA = document.getElementById('r-area');
        let next = REBIRTHS.findIndex(r => r.m > state.m);
        if (next !== -1) {
            rA.innerHTML = `<button class="game-btn r-btn" onclick="buyR(${next})" ${state.b < REBIRTHS[next].c ? 'disabled' : ''}>REBIRTH ${REBIRTHS[next].n} (${f(REBIRTHS[next].c)} ₽)</button>`;
        } else rA.innerHTML = "";
    }

    const canvas = document.getElementById('snow-box'); const ctx = canvas.getContext('2d'); let flakes = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    for(let i=0; i<40; i++) flakes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, s: Math.random()*1+0.2});
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "white"; ctx.beginPath();
        flakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); f.y += f.s; if(f.y > canvas.height) f.y = -5; });
        ctx.fill(); requestAnimationFrame(draw);
    }
    draw(); load();
</script>
</body>
</html>
