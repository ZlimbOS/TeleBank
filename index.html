<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoBank | Evolution</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #7000ff;
            --bg: #0b0e14;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top right, #16213e, #0b0e14);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
            width: 350px;
            position: relative;
        }

        h1 { font-weight: 900; letter-spacing: -1px; margin-bottom: 5px; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tag { font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }

        /* Красивые градиентные кнопки */
        .btn {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(112, 0, 255, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { background: #333; box-shadow: none; opacity: 0.3; cursor: not-allowed; }

        .rebirth-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3); }

        .stats-card {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .balance-label { font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px; }
        .balance-val { font-size: 2rem; font-weight: 900; color: var(--primary); }

        /* Зона клика */
        .coin-wrapper { position: relative; margin: 30px 0; }
        .main-coin {
            width: 140px; height: 140px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 60px;
            margin: 0 auto;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.3);
            transition: 0.1s;
        }
        .main-coin:active { transform: scale(0.92) rotate(5deg); }

        .rebirth-badge { font-size: 0.8rem; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>

    <!-- ВХОД -->
    <div id="scr-auth" class="container">
        <h1>NEOBANK</h1>
        <p class="tag">Next-Gen Assets</p>
        <input type="text" id="username" placeholder="ВВЕДИТЕ ВАШЕ ИМЯ">
        <button class="btn" onclick="init()">СОЗДАТЬ АККАУНТ</button>
    </div>

    <!-- ИГРА -->
    <div id="scr-game" class="container" style="display:none;">
        <h1 id="user-name">CLIENT</h1>
        <div class="rebirth-badge">РЕБИРТ: x<span id="mult-val">1</span></div>

        <div class="stats-card">
            <div class="balance-label">ТЕКУЩИЙ БАЛАНС</div>
            <div class="balance-val"><span id="balance">0</span> ₽</div>
            <div style="font-size: 0.8rem; margin-top: 10px; opacity: 0.8;">Клик: +<span id="pwr">100</span> ₽</div>
        </div>

        <div class="coin-wrapper">
            <div class="main-coin" onclick="tap()">💎</div>
        </div>

        <div id="shop">
            <button id="l1" class="btn" onclick="buy(1, 500)">LVL 2: 500 ₽</button>
            <button id="l2" class="btn" style="display:none" onclick="buy(2, 1500)">LVL 3: 1500 ₽</button>
            <button id="l3" class="btn" style="display:none" onclick="buy(3, 5000)">LVL 4: 5000 ₽</button>
            <button id="l4" class="btn" style="display:none" onclick="buy(4, 10000)">LVL 5: 10000 ₽</button>
            <button id="l5" class="btn" style="display:none" onclick="buy(5, 50000)">LVL 6: 50000 ₽</button>
            <div id="max" style="display:none; padding:15px; font-weight:bold; color:var(--primary);">MAX CONFIGURATION REACHED</div>
        </div>

        <!-- Кнопки Ребиртов -->
        <button id="rb1" class="btn rebirth-btn" style="display:none" onclick="rebirth(15000, 2)">REBIRTH x2 (15000 ₽)</button>
        <button id="rb2" class="btn rebirth-btn" style="display:none" onclick="rebirth(50000, 3)">REBIRTH x3 (50000 ₽)</button>

        <p class="tag" style="margin-top:40px">NeoBank Evolution © 2026</p>
    </div>

    <script>
        let balance = 0, level = 0, multiplier = 1;
        const powers =;

        function init() {
            const n = document.getElementById('username').value;
            if(n) {
                document.getElementById('scr-auth').style.display='none';
                document.getElementById('scr-game').style.display='block';
                document.getElementById('user-name').innerText = n;
                update();
            }
        }

        function tap() {
            balance += powers[level] * multiplier;
            update();
        }

        function buy(l, price) {
            if(balance >= price) {
                balance -= price;
                level = l;
                update();
            }
        }

        function rebirth(price, newMult) {
            if(balance >= price) {
                balance = 0;
                level = 0;
                multiplier = newMult;
                update();
            }
        }

        function update() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('pwr').innerText = (powers[level] * multiplier).toLocaleString();
            document.getElementById('mult-val').innerText = multiplier;

            // Отображение кнопок уровней
            for(let i=1; i<=5; i++) {
                let b = document.getElementById('l'+i);
                if(b) b.style.display = (level === i-1) ? 'block' : 'none';
            }
            document.getElementById('max').style.display = (level === 5) ? 'block' : 'none';

            // Доступность кнопок
            const prices =;
            for(let i=1; i<=5; i++) {
                let b = document.getElementById('l'+i);
                if(b) b.disabled = balance < prices[i-1];
            }

            // Логика Ребиртов
            const rb1 = document.getElementById('rb1');
            const rb2 = document.getElementById('rb2');
            
            // Первый ребирт (показываем если мультипликатор 1)
            if(multiplier === 1) {
                rb1.style.display = (balance >= 10000) ? 'block' : 'none';
                rb1.disabled = balance < 15000;
                rb2.style.display = 'none';
            } 
            // Второй ребирт (показываем если уже есть x2)
            else if(multiplier === 2) {
                rb1.style.display = 'none';
                rb2.style.display = (balance >= 30000) ? 'block' : 'none';
                rb2.disabled = balance < 50000;
            } else {
                rb1.style.display = 'none';
                rb2.style.display = 'none';
            }
        }
    </script>
</body>
</html>
