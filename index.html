<canvas id="snow-layer"></canvas>

<!-- Кнопка промокода сверху справа -->
<div id="promo-trigger" onclick="togglePromo(true)">🎁 ПРОМОКОД</div>

<!-- Модальное окно промокода -->
<div id="promo-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>АКТИВАЦИЯ</h3>
        <input type="text" id="promo-input" placeholder="ВВЕДИТЕ КОД...">
        <button class="u-btn" onclick="activatePromo()">ПОДТВЕРДИТЬ</button>
        <button class="promo-btn" style="background: #475569" onclick="togglePromo(false)">ЗАКРЫТЬ</button>
    </div>
</div>

<div class="card">
    <div style="font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px;">TELEBANK WINTER V.FINAL</div>
    
    <div class="bal-box">
        <div class="bal-label">БАЛАНС</div>
        <div class="bal-val"><span id="display-balance">0</span> ₽</div>
        <div id="display-mult" style="color: var(--rb); font-size: 0.8rem; font-weight: bold; margin-top: 5px;">МНОЖИТЕЛЬ: x1</div>
    </div>
    
    <div class="coin-btn" id="main-tap-area">🪙</div>
    
    <div id="game-shop">
        <p style="font-size: 0.8rem;">ДОХОД: <span id="display-tap" style="color: var(--p)">100</span> ₽/ТАП</p>
        <div id="lvl-slot"></div>
        <div id="rb-slot" style="margin-top: 10px;"></div>
        <div id="max-info" style="display:none; color: gold; font-weight:bold; margin-top:10px;">ULTIMATE POWER 👑</div>
    </div>
</div>

<style>
    /* Новые стили для промокода */
    #promo-trigger {
        position: fixed; top: 20px; right: 20px;
        background: rgba(59, 130, 246, 0.8); padding: 10px 15px;
        border-radius: 12px; cursor: pointer; font-weight: bold;
        font-size: 0.8rem; z-index: 100; border: 1px solid rgba(255,255,255,0.2);
    }
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); display: none; 
        justify-content: center; align-items: center; z-index: 200;
    }
    .modal-content {
        background: #1e293b; padding: 30px; border-radius: 25px;
        width: 280px; text-align: center; border: 1px solid var(--p);
    }
</style>

<script>
    // 1. ИСПРАВЛЕННЫЕ ДАННЫЕ
    const POWERS = [100, 250, 600, 1500, 4000, 10000, 25000, 75000, 200000];
    const COSTS = [1500, 5000, 15000, 50000, 150000, 500000, 2000000, 10000000];
    const REBIRTHS = [
        { c: 100000, m: 2, n: "x2" },
        { c: 1000000, m: 5, n: "x5" },
        { c: 50000000, m: 100, n: "x100" }
    ];

    let game = { b: 0, l: 0, m: 1, p: false };

    // Загрузка
    const saved = localStorage.getItem('tb_v2');
    if (saved) game = JSON.parse(saved);

    // Снег
    const canvas = document.getElementById('snow-layer');
    const ctx = canvas.getContext('2d');
    let flakes = [];
    function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = res; res();
    for(let i=0; i<60; i++) flakes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, s: Math.random()*1+0.5});
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white"; ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            f.y += f.s; if(f.y > canvas.height) f.y = -5;
        });
        ctx.fill(); requestAnimationFrame(draw);
    }
    draw();

    // Клики
    document.getElementById('main-tap-area').onclick = function(e) {
        let gain = POWERS[game.l] * game.m;
        game.b += gain;
        
        const anim = document.createElement('div');
        anim.className = 'plus-anim';
        anim.innerText = "+" + gain.toLocaleString();
        anim.style.left = e.clientX + "px";
        anim.style.top = e.clientY + "px";
        document.body.appendChild(anim);
        setTimeout(() => anim.remove(), 800);
        refresh();
    };

    // Магазин
    function buyLvl() {
        if (game.b >= COSTS[game.l]) {
            game.b -= COSTS[game.l];
            game.l++;
            refresh();
        }
    }

    function buyRb(idx) {
        if (game.b >= REBIRTHS[idx].c) {
            game.b = 0; game.l = 0;
            game.m = REBIRTHS[idx].m;
            refresh();
        }
    }

    // Промокоды
    function togglePromo(show) {
        document.getElementById('promo-modal').style.display = show ? 'flex' : 'none';
    }

    function activatePromo() {
        const val = document.getElementById('promo-input').value.trim().toUpperCase();
        if (game.p) { alert("Вы уже использовали промокод!"); return; }
        
        if (val === "РУБЦОВ") {
            game.b += 500000;
            game.p = true;
            alert("Бонус 500,000 ₽ начислен!");
            togglePromo(false);
            refresh();
        } else {
            alert("Неверный код!");
        }
    }

    function refresh() {
        document.getElementById('display-balance').innerText = Math.floor(game.b).toLocaleString();
        document.getElementById('display-tap').innerText = (POWERS[game.l] * game.m).toLocaleString();
        document.getElementById('display-mult').innerText = "МНОЖИТЕЛЬ: x" + game.m;

        // Кнопка улучшения
        const lSlot = document.getElementById('lvl-slot');
        if (game.l < COSTS.length) {
            lSlot.innerHTML = `<button class="u-btn" id="btn-up" onclick="buyLvl()">LEVEL ${game.l + 2} (${COSTS[game.l].toLocaleString()} ₽)</button>`;
            document.getElementById('btn-up').disabled = game.b < COSTS[game.l];
            document.getElementById('max-info').style.display = 'none';
        } else {
            lSlot.innerHTML = "";
            document.getElementById('max-info').style.display = 'block';
        }

        // Кнопка ребиртха
        const rSlot = document.getElementById('rb-slot');
        const nextRbIdx = REBIRTHS.findIndex(r => r.m > game.m);
        if (nextRbIdx !== -1) {
            const rb = REBIRTHS[nextRbIdx];
            rSlot.innerHTML = `<button class="r-btn" id="btn-rb" onclick="buyRb(${nextRbIdx})">REBIRTH ${rb.n} (${rb.c.toLocaleString()} ₽)</button>`;
            document.getElementById('btn-rb').disabled = game.b < rb.c;
        } else { rSlot.innerHTML = ""; }

        localStorage.setItem('tb_v2', JSON.stringify(game));
    }

    refresh();
</script>
