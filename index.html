<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Winter Ultimate x400</title>
    <style>
        :root { --p: #00ff88; --bg: #030712; --rb: #f093fb; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: white; display: flex; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; 
            user-select: none; overflow: hidden; 
        }
        #snow-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .card { 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 30px; text-align: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.9); width: 350px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }
        .money-val { font-size: 2.2rem; font-weight: 900; color: var(--p); margin: 10px 0; text-shadow: 0 0 20px rgba(0,255,136,0.4); }
        .coin-btn { 
            width: 130px; height: 130px; 
            background: radial-gradient(circle, #ffd700, #ff8c00); 
            border-radius: 50%; margin: 20px auto; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 65px; box-shadow: 0 0 40px rgba(255, 165, 0, 0.4); 
            transition: 0.1s; border: 5px solid rgba(255,255,255,0.2);
            position: relative; z-index: 20;
        }
        .coin-btn:active { transform: scale(0.9); }
        button.game-btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            margin-top: 10px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s;
        }
        .u-btn { background: var(--p); color: #000; }
        .r-btn { background: var(--rb); color: white; }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        .plus { 
            position: absolute; color: var(--p); font-weight: bold; 
            animation: moveUp 0.8s forwards; pointer-events: none; 
            font-size: 1.3rem; z-index: 150; text-shadow: 0 0 5px #000;
        }
        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="snow-box"></canvas>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px;">TELEBANK ULTIMATE v.MAX</div>
    <div class="money-val" id="bal">0 ₽</div>
    <div id="m-info" style="color: var(--rb); font-size: 0.9rem; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
    
    <div class="coin-btn" id="coin">🪙</div>
    
    <div id="shop">
        <p style="font-size: 0.85rem;"><span id="inc-lbl">ДОХОД:</span> <span id="inc-val" style="color: var(--p)">100</span> ₽</p>
        <div id="u-area"></div>
        <div id="r-area"></div>
    </div>
</div>

<script>
    // 1. КОНФИГУРАЦИЯ БАЗЫ (Строго 11 уровней и ребирхи)
    const DATA = {
        powers: [100, 200, 300, 400, 1000, 1500, 3000, 15000, 35000, 2000000, 600000000],
        costs: [500, 1500, 5000, 10000, 50000, 150000, 1000000, 2500000, 50000000, 250000000000],
        rebirths: [
            { cost: 15000, mult: 2, name: "x2" },
            { cost: 1000000, mult: 10, name: "x10" },
            { cost: 100000000, mult: 100, name: "x100" },
            { cost: 250000000000, mult: 200, name: "x200" },
            { cost: 2000000000000, mult: 400, name: "SUPREME x400" }
        ]
    };

    let state = { b: 0, l: 0, m: 1 };

    // Загрузка
    const saved = localStorage.getItem('tb_ultra_v6');
    if (saved) Object.assign(state, JSON.parse(saved));

    // Умное сокращение чисел
    function f(n) {
        if (n >= 1e12) return (n / 1e12).toFixed(2) + " ТРЛН";
        if (n >= 1e9) return (n / 1e9).toFixed(2) + " МЛРД";
        if (n >= 1e6) return (n / 1e6).toFixed(1) + " МЛН";
        return Math.floor(n).toLocaleString();
    }

    // Логика дохода
    function getPower() { return DATA.powers[state.l] * state.m; }

    // Авто-доход (с 10 уровня - индекс 9)
    setInterval(() => {
        if (state.l >= 9) {
            state.b += getPower();
            refresh();
        }
    }, 1000);

    // Клик
    document.getElementById('coin').onclick = function(e) {
        let gain = getPower();
        state.b += gain;
        const anim = document.createElement('div');
        anim.className = 'plus';
        anim.innerText = "+" + f(gain);
        anim.style.left = e.clientX + "px";
        anim.style.top = e.clientY + "px";
        document.body.appendChild(anim);
        setTimeout(() => anim.remove(), 800);
        refresh();
    };

    // Покупки
    window.buyL = () => {
        let price = DATA.costs[state.l];
        if (state.b >= price) {
            state.b -= price; state.l++; save(); refresh();
        }
    };

    window.buyR = (i) => {
        let rb = DATA.rebirths[i];
        if (state.b >= rb.cost) {
            state.b = 0; state.l = 0; state.m = rb.mult; save(); refresh();
        }
    };

    function save() { localStorage.setItem('tb_ultra_v6', JSON.stringify(state)); }

    function refresh() {
        document.getElementById('bal').innerText = f(state.b) + " ₽";
        document.getElementById('m-info').innerText = "МНОЖИТЕЛЬ: x" + state.m;
        
        const isA = state.l >= 9;
        document.getElementById('inc-lbl').innerText = isA ? "АВТО-ДОХОД:" : "ДОХОД:";
        document.getElementById('inc-val').innerText = f(getPower()) + (isA ? " /СЕК" : " /ТАП");
        document.getElementById('inc-val').style.color = isA ? "gold" : "var(--p)";

        // Улучшение
        const uA = document.getElementById('u-area');
        if (state.l < DATA.costs.length) {
            let p = DATA.costs[state.l];
            uA.innerHTML = `<button class="game-btn u-btn" onclick="buyL()" ${state.b < p ? 'disabled' : ''}>LVL ${state.l + 2}: ${f(p)} ₽</button>`;
        } else {
            uA.innerHTML = "<div style='color:gold; padding:10px; font-weight:bold;'>МАКС. УРОВЕНЬ ДОСТИГНУТ 👑</div>";
        }

        // Ребирх
        const rA = document.getElementById('r-area');
        let next = DATA.rebirths.findIndex(r => r.mult > state.m);
        if (next !== -1) {
            let rb = DATA.rebirths[next];
            rA.innerHTML = `<button class="game-btn r-btn" onclick="buyR(${next})" ${state.b < rb.cost ? 'disabled' : ''}>REBIRTH ${rb.name} (${f(rb.cost)} ₽)</button>`;
        } else { rA.innerHTML = ""; }
    }

    // Снег (без изменений)
    const canvas = document.getElementById('snow-box');
    const ctx = canvas.getContext('2d');
    let flakes = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    for(let i=0; i<60; i++) flakes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, s: Math.random()*1+0.2});
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white"; ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            f.y += f.s; if(f.y > canvas.height) f.y = -5;
        });
        ctx.fill(); requestAnimationFrame(draw);
    }
    draw(); refresh();
</script>
</body>
</html>
