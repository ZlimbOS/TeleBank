<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Ultra 2026</title>
    <style>
        :root { --p: #00ff88; --bg: #0f172a; --rb: #f093fb; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; user-select: none; overflow: hidden; }
        .card { background: rgba(30, 41, 59, 0.95); padding: 25px; border-radius: 25px; text-align: center; box-shadow: 0 20px 60px #000; width: 340px; border: 1px solid rgba(255,255,255,0.1); }
        .bal { font-size: 2.5rem; font-weight: 900; color: var(--p); margin: 10px 0; }
        .coin { width: 130px; height: 130px; background: linear-gradient(135deg, #ffd700, #ff8c00); border-radius: 50%; margin: 15px auto; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 60px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); transition: 0.1s; }
        .coin:active { transform: scale(0.9); }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; margin-top: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .u-btn { background: var(--p); color: #052e16; }
        .r-btn { background: var(--rb); color: white; }
        button:disabled { opacity: 0.1; cursor: not-allowed; filter: grayscale(1); }
        .plus { position: absolute; color: var(--p); font-weight: bold; animation: f 0.8s forwards; pointer-events: none; font-size: 1.5rem; z-index: 100; }
        @keyframes f { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
        .res { margin-top: 20px; color: #ff4444; font-size: 10px; cursor: pointer; opacity: 0.4; background: none; border: none; width: auto; text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px;">TELEBANK ULTRA v9.0</div>
    <div class="bal"><span id="b">0</span> ₽</div>
    <div id="m-info" style="color: var(--rb); font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">МНОЖИТЕЛЬ: x1</div>
    
    <div class="coin" id="coin-btn">🪙</div>
    
    <div id="shop">
        <p style="font-size: 0.8rem;">ДОХОД: <span id="t-pwr" style="color: var(--p)">100</span> ₽/КЛИК</p>
        <div id="upgrade-slot"></div>
        <div id="rebirth-slot"></div>
        <div id="max-txt" style="display:none; color: gold; font-weight:bold; margin-top:10px;">MAX LEVEL 👑</div>
    </div>
    
    <button class="res" id="reset-trigger">СБРОСИТЬ ПРОГРЕСС</button>
</div>

<script>
    // Настройки
    const POWERS =;
    const COSTS =;
    const RB_LIST = [
        { c: 15000, m: 2, n: "x2" },
        { c: 50000, m: 3, n: "x3" },
        { c: 200000, m: 4, n: "x4" },
        { c: 10000000, m: 10, n: "MEGA x10" }
    ];

    let game = { balance: 0, level: 0, mult: 1 };

    // Загрузка
    const saved = localStorage.getItem('tb_ultra_v9');
    if (saved) {
        try { game = JSON.parse(saved); } catch(e) { console.log("New start"); }
    }

    // ТАП (Самая важная часть)
    const coin = document.getElementById('coin-btn');
    coin.addEventListener('click', function(e) {
        let gain = POWERS[game.level] * game.mult;
        game.balance += gain;
        
        // Показ +Денег
        const p = document.createElement('div');
        p.className = 'plus';
        p.innerText = "+" + gain.toLocaleString();
        p.style.left = e.clientX + "px";
        p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        
        update();
    });

    // ПОКУПКА УРОВНЯ
    function buyUpgrade() {
        let cost = COSTS[game.level];
        if (game.balance >= cost) {
            game.balance -= cost;
            game.level++;
            update();
        }
    }

    // РЕБИРТХ
    function buyRebirth(idx) {
        let rb = RB_LIST[idx];
        if (game.balance >= rb.c) {
            game.balance = 0;
            game.level = 0;
            game.mult = rb.m;
            update();
        }
    }

    // ОБНОВЛЕНИЕ ЭКРАНА
    function update() {
        document.getElementById('b').innerText = Math.floor(game.balance).toLocaleString();
        document.getElementById('t-pwr').innerText = (POWERS[game.level] * game.mult).toLocaleString();
        document.getElementById('m-info').innerText = "МНОЖИТЕЛЬ СИСТЕМЫ: x" + game.mult;

        // Кнопка ЛВЛ
        const upgSlot = document.getElementById('upgrade-slot');
        if (game.level < 8) {
            upgSlot.innerHTML = `<button class="u-btn" id="upg-btn">LEVEL ${game.level + 2} (${COSTS[game.level].toLocaleString()} ₽)</button>`;
            const b = document.getElementById('upg-btn');
            b.onclick = buyUpgrade;
            b.disabled = game.balance < COSTS[game.level];
            document.getElementById('max-txt').style.display = 'none';
        } else {
            upgSlot.innerHTML = "";
            document.getElementById('max-txt').style.display = 'block';
        }

        // Кнопка Ребиртха
        const rbSlot = document.getElementById('rebirth-slot');
        let nextRbIdx = RB_LIST.findIndex(r => r.m > game.mult);
        if (nextRbIdx !== -1) {
            let rb = RB_LIST[nextRbIdx];
            rbSlot.innerHTML = `<button class="r-btn" id="rb-btn">REBIRTH ${rb.n} (${rb.c.toLocaleString()} ₽)</button>`;
            const b = document.getElementById('rb-btn');
            b.onclick = () => buyRebirth(nextRbIdx);
            b.disabled = game.balance < rb.c;
        } else {
            rbSlot.innerHTML = "";
        }

        localStorage.setItem('tb_ultra_v9', JSON.stringify(game));
    }

    // СБРОС
    document.getElementById('reset-trigger').onclick = function() {
        if (confirm("ВЫ УВЕРЕНЫ? ВЕСЬ ПРОГРЕСС БУДЕТ СТЕРТ!")) {
            localStorage.clear();
            location.reload();
        }
    }

    // Первичный запуск
    update();
</script>
</body>
</html>
