<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Evolution</title>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00bd65;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.8);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 320px;
        }

        h2 { font-size: 1.8rem; margin-bottom: 20px; color: var(--primary); letter-spacing: 2px; }

        input {
            width: 90%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #052e16;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3); }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .rebirth-btn { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }

        .stats-box {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .balance-value { font-size: 2rem; font-weight: bold; color: var(--primary); display: block; }
        
        .coin {
            width: 140px; height: 140px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 70px; margin: 20px auto;
            cursor: pointer; user-select: none;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            transition: 0.1s;
        }
        .coin:active { transform: scale(0.9); }

        .plus-one {
            position: absolute; color: var(--primary); font-weight: bold;
            animation: floatUp 0.8s ease-out forwards; pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="reg-screen" class="container">
        <h2>TELEBANK</h2>
        <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 20px;">DIGITAL ASSETS</p>
        <input type="text" id="username" placeholder="ИМЯ КЛИЕНТА">
        <button id="reg-btn">СОЗДАТЬ АККАУНТ</button>
    </div>

    <!-- ЭКРАН БАНКА -->
    <div id="game-screen" class="container" style="display:none;">
        <div id="client-id" style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px;"></div>
        
        <div class="stats-box">
            <span style="font-size: 0.7rem; opacity: 0.6;">БАЛАНС</span>
            <span class="balance-value"><span id="balance">0</span> ₽</span>
            <div id="mult-tag" style="color: #f093fb; font-size: 0.8rem; margin-top: 5px; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
        </div>

        <div class="coin" id="coin">🪙</div>

        <div id="upgrades">
            <p style="font-size: 0.8rem; margin-bottom: 15px;">ЗА КЛИК: <span id="per-tap" style="color: var(--primary)">100</span> ₽</p>
            
            <button id="u1">УЛУЧШИТЬ ДО LVL 2 (500 ₽)</button>
            <button id="u2" style="display:none;">УЛУЧШИТЬ ДО LVL 3 (1500 ₽)</button>
            <button id="u3" style="display:none;">УЛУЧШИТЬ ДО LVL 4 (5000 ₽)</button>
            <button id="u4" style="display:none;">УЛУЧШИТЬ ДО LVL 5 (10000 ₽)</button>
            <button id="u5" style="display:none;">УЛУЧШИТЬ ДО LVL 6 (50000 ₽)</button>
            
            <button id="rb1" class="rebirth-btn" style="display:none;">РЕБИРТ x2 (15000 ₽)</button>
            <button id="rb2" class="rebirth-btn" style="display:none;">РЕБИРТ x3 (50000 ₽)</button>
            
            <div id="max-lvl" style="display:none; color: gold; font-weight: bold; margin-top: 15px;">MAX SYSTEM LEVEL 👑</div>
        </div>
    </div>

    <script>
        let balance = 0;
        let currentLvl = 0;
        let multiplier = 1;

        const basePowers = [100, 200, 300, 400, 1000, 1500];
        const upgCosts = [500, 1500, 5000, 10000, 50000];

        // Регистрация
        document.getElementById('reg-btn').onclick = function() {
            const name = document.getElementById('username').value.trim();
            if (name !== "") {
                document.getElementById('reg-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                document.getElementById('client-id').innerText = "КЛИЕНТ: " + name.toUpperCase();
                updateUI();
            } else {
                alert("Введите имя для доступа к системе!");
            }
        };

        // Клик по монете
        document.getElementById('coin').onclick = function(e) {
            let gain = basePowers[currentLvl] * multiplier;
            balance += gain;
            
            const plus = document.createElement('div');
            plus.innerText = `+${gain}`;
            plus.className = 'plus-one';
            plus.style.left = e.clientX + 'px';
            plus.style.top = e.clientY + 'px';
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 800);
            
            updateUI();
        };

        // Функция покупки уровня
        function buyUpg(lvl) {
            let cost = upgCosts[lvl - 1];
            if (balance >= cost) {
                balance -= cost;
                currentLvl = lvl;
                updateUI();
            }
        }

        // Привязка кнопок уровней
        for(let i=1; i<=5; i++) {
            document.getElementById('u' + i).onclick = function() { buyUpg(i); };
        }

        // Ребиртхи
        document.getElementById('rb1').onclick = function() {
            if(balance >= 15000) { balance = 0; currentLvl = 0; multiplier = 2; updateUI(); }
        };
        document.getElementById('rb2').onclick = function() {
            if(balance >= 50000) { balance = 0; currentLvl = 0; multiplier = 3; updateUI(); }
        };

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('per-tap').innerText = (basePowers[currentLvl] * multiplier).toLocaleString();
            document.getElementById('mult-tag').innerText = `МНОЖИТЕЛЬ: x${multiplier}`;

            // Видимость уровней
            for(let i=1; i<=5; i++) {
                let btn = document.getElementById('u' + i);
                btn.style.display = (currentLvl === i-1) ? 'block' : 'none';
                btn.disabled = balance < upgCosts[i-1];
            }

            document.getElementById('max-lvl').style.display = (currentLvl === 5) ? 'block' : 'none';

            // Видимость ребиртхов
            const rb1 = document.getElementById('rb1');
            const rb2 = document.getElementById('rb2');
            
            if (multiplier === 1) {
                rb1.style.display = 'block';
                rb1.disabled = balance < 15000;
                rb2.style.display = 'none';
            } else if (multiplier === 2) {
                rb1.style.display = 'none';
                rb2.style.display = 'block';
                rb2.disabled = balance < 50000;
            } else {
                rb1.style.display = 'none';
                rb2.style.display = 'none';
            }
        }
    </script>
</body>
</html>
