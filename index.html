<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Clicker Bank</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding-top: 50px; }
        .card { background: white; width: 300px; margin: 0 auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #money-img { width: 150px; cursor: pointer; transition: transform 0.1s; }
        #money-img:active { transform: scale(0.9); }
        button { margin-top: 10px; padding: 10px; cursor: pointer; border: none; border-radius: 5px; background: #28a745; color: white; }
        button:disabled { background: #ccc; }
        .stats { font-size: 1.2em; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="reg-screen" class="card">
        <h2>Регистрация в Банке</h2>
        <input type="text" id="username" placeholder="Введите имя">
        <button onclick="register()">Войти</button>
    </div>

    <div id="game-screen" class="card" style="display:none;">
        <h2 id="welcome">Привет!</h2>
        <div class="stats">Баланс: <span id="balance">0</span> руб.</div>
        <div class="stats">За тап: +<span id="per-tap">100</span> руб.</div>
        
        <img src="https://flaticon.com" id="money-img" onclick="tap()">
        
        <div style="margin-top: 20px;">
            <button id="upg1" onclick="upgrade(1, 500, 200)">Улучшить за 500 руб (+200 за тап)</button>
            <button id="upg2" onclick="upgrade(2, 1500, 300)" style="display:none;">Улучшить за 1500 руб (+300 за тап)</button>
            <p id="max-lvl" style="display:none; color: gold; font-weight: bold;">МАКСИМАЛЬНЫЙ УРОВЕНЬ</p>
        </div>
    </div>

    <script>
        let balance = 0;
        let perTap = 100;
        let level = 0;

        function register() {
            const name = document.getElementById('username').value;
            if (name) {
                document.getElementById('reg-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                document.getElementById('welcome').innerText = "Банк: " + name;
            }
        }

        function tap() {
            balance += perTap;
            updateUI();
        }

        function upgrade(lvl, cost, nextPower) {
            if (balance >= cost) {
                balance -= cost;
                perTap = nextPower;
                level = lvl;
                
                if (lvl === 1) {
                    document.getElementById('upg1').style.display = 'none';
                    document.getElementById('upg2').style.display = 'inline-block';
                } else if (lvl === 2) {
                    document.getElementById('upg2').style.display = 'none';
                    document.getElementById('max-lvl').style.display = 'block';
                }
                updateUI();
            } else {
                alert("Недостаточно денег!");
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            document.getElementById('per-tap').innerText = perTap;
        }
    </script>
</body>
</html>
