<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Winter Immortal x5000</title>
    <style>
        :root { --p: #00ff88; --bg: #030712; --rb: #f093fb; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: white; display: flex; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; 
            user-select: none; overflow: hidden; 
        }
        #snow-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .card { 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 30px; text-align: center; 
            box-shadow: 0 0 100px rgba(0,255,136,0.15); width: 360px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }
        .money-val { font-size: 2rem; font-weight: 900; color: var(--p); margin: 10px 0; text-shadow: 0 0 20px rgba(0,255,136,0.4); }
        .coin-btn { 
            width: 130px; height: 130px; 
            background: radial-gradient(circle, #ffd700, #ff8c00); 
            border-radius: 50%; margin: 20px auto; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 65px; box-shadow: 0 0 50px rgba(255, 165, 0, 0.3); 
            transition: 0.1s; border: 5px solid rgba(255,255,255,0.2);
            position: relative; z-index: 20;
        }
        .coin-btn:active { transform: scale(0.9); }
        button.game-btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            margin-top: 8px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s;
        }
        .u-btn { background: var(--p); color: #000; }
        .r-btn { background: var(--rb); color: white; }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        .plus { 
            position: absolute; color: var(--p); font-weight: bold; 
            animation: moveUp 0.8s forwards; pointer-events: none; 
            font-size: 1.2rem; z-index: 150; text-shadow: 0 0 5px #000;
        }
        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="snow-box"></canvas>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px;">TELEBANK WINTER IMMORTAL</div>
    <div class="money-val" id="bal">0 ₽</div>
    <div id="m-info" style="color: var(--rb); font-size: 0.9rem; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
    
    <div class="coin-btn" id="coin">🪙</div>
    
    <div id="shop">
        <p style="font-size: 0.85rem;"><span id="inc-lbl">ДОХОД:</span> <span id="inc-val" style="color: var(--p)">100</span> ₽</p>
        <div id="u-area"></div>
        <div id="r-area"></div>
    </div>
</div>

<script>
    // 1. УЛЬТРА-ФОРМАТИРОВАНИЕ
    function f(n) {
        if (n >= 1e15) return (n / 1e15).toFixed(3) + " КВАДР";
        if (n >= 1e12) return (n / 1e12).toFixed(2) + " ТРЛН";
        if (n >= 1e9) return (n / 1e9).toFixed(2) + " МЛРД";
        if (n >= 1e6) return (n / 1e6).toFixed(1) + " МЛН";
        return Math.floor(n).toLocaleString();
    }

    // 2. БАЗА ДАННЫХ
    const POWERS =; // 12-й уровень дает x1000 от базы 2М
    const COSTS =; // 12-й стоит 500 ТРЛН

    const REBIRTHS = [
        { c: 1000000, m: 10, n: "x10" },
        { c: 100000000, m: 100, n: "x100" },
        { c: 250000000000, m: 200, n: "x200" },
        { c: 2000000000000, m: 400, n: "x400" },
        { c: 15000000000000000, m: 5000, n: "OMEGA x5000" } // 15 Квадриллионов
    ];

    let state = { b: 0, l: 0, m: 1 };
    const S_KEY = 'tb_immortal_v7';

    // Загрузка
    function load() {
        const saved = localStorage.getItem(S_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            state.b = data.b || 0;
            state.l = data.l || 0;
            state.m = data.m || 1;
        }
    }
    function save() { localStorage.setItem(S_KEY, JSON.stringify(state)); }

    load();

    // 3. ДОХОД
    function getP() { return POWERS[state.l] * state.m; }

    setInterval(() => {
        if (state.l >= 9) {
            state.b += getP();
            refresh();
            save(); // Сохранение каждую секунду при авто-доходе
        }
    }, 1000);

    document.getElementById('coin').onclick = (e) => {
        let gain = getP();
        state.b += gain;
        const anim = document.createElement('div');
        anim.className = 'plus';
        anim.innerText = "+" + f(gain);
        anim.style.left = e.clientX + "px";
        anim.style.top = e.clientY + "px";
        document.body.appendChild(anim);
        setTimeout(() => anim.remove(), 800);
        refresh();
        save();
    };

    // 4. МАГАЗИН
    window.buyL = () => {
        if (state.b >= COSTS[state.l]) {
            state.b -= COSTS[state.l]; state.l++; save(); refresh();
        }
    };

    window.buyR = (i) => {
        if (state.b >= REBIRTHS[i].c) {
            state.b = 0; state.l = 0; state.m = REBIRTHS[i].m; save(); refresh();
        }
    };

    // 5. ОБНОВЛЕНИЕ ЭКРАНА
    function refresh() {
        document.getElementById('bal').innerText = f(state.b) + " ₽";
        document.getElementById('m-info').innerText = "МНОЖИТЕЛЬ: x" + state.m;
        
        let isA = state.l >= 9;
        document.getElementById('inc-lbl').innerText = isA ? "АВТО-ДОХОД:" : "ДОХОД:";
        document.getElementById('inc-val').innerText = f(getP()) + (isA ? " /СЕК" : " /ТАП");
        document.getElementById('inc-val').style.color = isA ? "gold" : "var(--p)";

        const uA = document.getElementById('u-area');
        if (state.l < COSTS.length) {
            let pr = COSTS[state.l];
            uA.innerHTML = `<button class="game-btn u-btn" onclick="buyL()" ${state.b < pr ? 'disabled' : ''}>LVL ${state.l + 2}: ${f(pr)} ₽</button>`;
        } else {
            uA.innerHTML = "<div style='color:gold; padding:10px; font-weight:bold;'>MAX IMMORTAL LEVEL 👑</div>";
        }

        const rA = document.getElementById('r-area');
        let nR = REBIRTHS.findIndex(r => r.m > state.m);
        if (nR !== -1) {
            let rb = REBIRTHS[nR];
            rArea = `<button class="game-btn r-btn" onclick="buyR(${nR})" ${state.b < rb.c ? 'disabled' : ''}>REBIRTH ${rb.n} (${f(rb.c)} ₽)</button>`;
            rA.innerHTML = rArea;
        } else { rA.innerHTML = ""; }
    }

    // 6. СНЕГ
    const canvas = document.getElementById('snow-box');
    const ctx = canvas.getContext('2d');
    let flakes = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    for(let i=0; i<60; i++) flakes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, s: Math.random()*1+0.2});
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white"; ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            f.y += f.s; if(f.y > canvas.height) f.y = -5;
        });
        ctx.fill(); requestAnimationFrame(draw);
    }
    draw(); refresh();
</script>
</body>
</html>
