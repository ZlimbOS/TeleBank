<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Winter Ultimate</title>
    <style>
        :root { --p: #00ff88; --bg: #020617; --rb: #f093fb; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: white; display: flex; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; 
            user-select: none; overflow: hidden; 
        }

        /* Снежный фон */
        #snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        .card { 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 35px; text-align: center; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8); width: 340px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 10;
            position: relative;
        }

        .bal { font-size: 2.5rem; font-weight: 900; color: var(--p); margin: 5px 0; text-shadow: 0 0 15px rgba(0,255,136,0.3); }

        /* Монета — Самый высокий приоритет клика */
        .coin-box { position: relative; z-index: 100; margin: 20px 0; }
        .coin { 
            width: 140px; height: 140px; 
            background: radial-gradient(circle, #ffd700, #ff8c00); 
            border-radius: 50%; margin: 0 auto; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 70px; box-shadow: 0 0 35px rgba(255, 215, 0, 0.4); 
            transition: transform 0.05s; border: 4px solid rgba(255,255,255,0.2);
        }
        .coin:active { transform: scale(0.92); }

        button { 
            width: 100%; padding: 15px; border-radius: 14px; border: none; 
            margin-top: 10px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s; position: relative; z-index: 100;
        }
        .u-btn { background: var(--p); color: #052e16; }
        .r-btn { background: var(--rb); color: white; }
        .promo-btn { background: #3b82f6; color: white; font-size: 11px; margin-top: 5px; }
        button:disabled { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }

        input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155;
            background: rgba(0,0,0,0.4); color: white; text-align: center;
            margin-top: 15px; outline: none; box-sizing: border-box; position: relative; z-index: 100;
        }

        .plus { 
            position: absolute; color: var(--p); font-weight: bold; 
            animation: float 0.8s forwards; pointer-events: none; 
            font-size: 1.6rem; z-index: 200; text-shadow: 0 0 5px #000;
        }
        @keyframes float { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-130px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="snow"></canvas>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px;">TELEBANK WINTER EDITION</div>
    <div class="bal"><span id="balance">0</span> ₽</div>
    <div id="mult-info" style="color: var(--rb); font-size: 0.9rem; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
    
    <div class="coin-box">
        <div class="coin" id="coin">🪙</div>
    </div>
    
    <div id="shop">
        <p style="font-size: 0.85rem;">ДОХОД: <span id="tap-power" style="color: var(--p)">100</span> ₽/ТАП</p>
        <div id="upgrade-slot"></div>
        <div id="rebirth-slot"></div>
        <div id="max-info" style="display:none; color: gold; font-weight:bold; margin-top:10px;">ULTIMATE POWER 👑</div>
    </div>

    <div id="promo-area">
        <input type="text" id="promo-input" placeholder="ПРОМОКОД">
        <button class="promo-btn" id="promo-confirm">АКТИВИРОВАТЬ</button>
    </div>
</div>

<script>
    // 1. ПАРАМЕТРЫ
    const POWERS =;
    const COSTS =;
    const REBIRTHS = [
        { c: 15000, m: 2, n: "x2" },
        { c: 50000, m: 3, n: "x3" },
        { c: 200000, m: 4, n: "x4" },
        { c: 10000000, m: 10, n: "x10" },
        { c: 100000000, m: 100, n: "ULTRA x100" }
    ];

    let game = { balance: 0, level: 0, mult: 1, promoUsed: false };

    // Загрузка данных
    const saved = localStorage.getItem('tb_ultra_v11');
    if (saved) {
        try { 
            const parsed = JSON.parse(saved);
            game = {...game, ...parsed}; 
        } catch(e) { console.log("Resetting data"); }
    }

    // 2. СНЕГ (ОПТИМИЗИРОВАН)
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');
    let flakes = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    for(let i=0; i<80; i++) flakes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, s: Math.random()*1+0.5});
    function drawSnow() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white"; ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            f.y += f.s; if(f.y > canvas.height) f.y = -10;
        });
        ctx.fill(); requestAnimationFrame(drawSnow);
    }
    drawSnow();

    // 3. ЛОГИКА ТАПА
    const coinBtn = document.getElementById('coin');
    coinBtn.addEventListener('click', (e) => {
        let gain = POWERS[game.level] * game.mult;
        game.balance += gain;
        
        // Текст анимации
        const p = document.createElement('div');
        p.className = 'plus';
        p.innerText = "+" + gain.toLocaleString();
        p.style.left = e.clientX + "px";
        p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        
        updateUI();
    });

    // 4. ФУНКЦИИ
    function upgrade() {
        if (game.balance >= COSTS[game.level]) {
            game.balance -= COSTS[game.level];
            game.level++;
            updateUI();
        }
    }

    function doRebirth(idx) {
        if (game.balance >= REBIRTHS[idx].c) {
            game.balance = 0; game.level = 0;
            game.mult = REBIRTHS[idx].m;
            updateUI();
        }
    }

    document.getElementById('promo-confirm').onclick = () => {
        const input = document.getElementById('promo-input').value.trim().toUpperCase();
        if (game.promoUsed) return;
        if (input === "РУБЦОВ") {
            game.balance += 100000;
            game.promoUsed = true;
            alert("БОНУС 100,000 ₽ ЗАЧИСЛЕН!");
            updateUI();
        } else { alert("НЕВЕРНЫЙ КОД"); }
    };

    // 5. ОБНОВЛЕНИЕ ЭКРАНА
    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(game.balance).toLocaleString();
        document.getElementById('tap-power').innerText = (POWERS[game.level] * game.mult).toLocaleString();
        document.getElementById('mult-info').innerText = "МНОЖИТЕЛЬ СИСТЕМЫ: x" + game.mult;

        // Видимость промокода
        document.getElementById('promo-area').style.display = game.promoUsed ? 'none' : 'block';

        // Кнопка уровня
        const uSlot = document.getElementById('upgrade-slot');
        if (game.level < 8) {
            uSlot.innerHTML = `<button class="u-btn" id="u-btn-act">LEVEL ${game.level + 2} (${COSTS[game.level].toLocaleString()} ₽)</button>`;
            const b = document.getElementById('u-btn-act');
            b.onclick = upgrade;
            b.disabled = game.balance < COSTS[game.level];
            document.getElementById('max-info').style.display = 'none';
        } else {
            uSlot.innerHTML = "";
            document.getElementById('max-info').style.display = 'block';
        }

        // Кнопка ребиртха
        const rSlot = document.getElementById('rebirth-slot');
        const nextIdx = REBIRTHS.findIndex(r => r.m > game.mult);
        if (nextIdx !== -1) {
            const rb = REBIRTHS[nextIdx];
            rSlot.innerHTML = `<button class="r-btn" id="r-btn-act">REBIRTH ${rb.n} (${rb.c.toLocaleString()} ₽)</button>`;
            const b = document.getElementById('r-btn-act');
            b.onclick = () => doRebirth(nextIdx);
            b.disabled = game.balance < rb.c;
        } else { rSlot.innerHTML = ""; }

        localStorage.setItem('tb_ultra_v11', JSON.stringify(game));
    }

    updateUI();
</script>
</body>
</html>
