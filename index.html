<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Ultimate Edition</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.9);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 350px;
        }

        h2 { font-size: 2rem; margin: 0 0 20px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00bd65);
            color: #052e16;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover:not(:disabled) { transform: scale(1.02); }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .rebirth-btn { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; display: none; }

        .stats-box {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .balance-value { font-size: 2rem; font-weight: bold; color: var(--primary); display: block; }
        
        .coin {
            width: 130px; height: 130px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 65px; margin: 15px auto;
            cursor: pointer; user-select: none;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            transition: 0.1s;
        }
        .coin:active { transform: scale(0.9); }

        .plus-one {
            position: absolute; color: var(--primary); font-weight: bold;
            animation: floatUp 0.8s ease-out forwards; pointer-events: none;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .reset-link { color: #ff4444; font-size: 10px; margin-top: 20px; cursor: pointer; opacity: 0.5; display: block; text-decoration: none; }
    </style>
</head>
<body>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="reg-screen" class="container">
        <h2>NeoBank</h2>
        <input type="text" id="username" placeholder="ВВЕДИТЕ ИМЯ" autocomplete="off">
        <button id="start-btn">ОТКРЫТЬ СЧЕТ</button>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="game-screen" class="container" style="display:none;">
        <div id="client-display" style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px; font-weight: bold;"></div>
        
        <div class="stats-box">
            <span style="font-size: 0.7rem; opacity: 0.6;">БАЛАНС</span>
            <span class="balance-value"><span id="balance">0</span> ₽</span>
            <div id="mult-tag" style="color: #f093fb; font-size: 0.8rem; margin-top: 5px; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
        </div>

        <div class="coin" id="coin-btn">🪙</div>

        <div id="shop">
            <p style="font-size: 0.8rem; margin-bottom: 10px;">КЛИК: <span id="per-tap" style="color: var(--primary)">100</span> ₽</p>
            
            <div id="upg-buttons">
                <button id="u1">LEVEL 2 (500 ₽)</button>
                <button id="u2">LEVEL 3 (1500 ₽)</button>
                <button id="u3">LEVEL 4 (5000 ₽)</button>
                <button id="u4">LEVEL 5 (10000 ₽)</button>
                <button id="u5">LEVEL 6 (50000 ₽)</button>
                <button id="u6">LEVEL 7 (150000 ₽)</button>
                <button id="u7">LEVEL 8 (1.000.000 ₽)</button>
            </div>
            
            <button id="rb1" class="rebirth-btn">REBIRTH x2 (15000 ₽)</button>
            <button id="rb2" class="rebirth-btn">REBIRTH x3 (50000 ₽)</button>
            <button id="rb3" class="rebirth-btn">REBIRTH x4 (200000 ₽)</button>
            
            <div id="max-lvl" style="display:none; color: gold; font-weight: bold; margin-top: 15px;">СИСТЕМА МАКСИМАЛЬНО ПРОКАЧАНА 👑</div>
        </div>

        <a class="reset-link" onclick="resetAll()">СБРОСИТЬ ВСЁ</a>
    </div>

    <script>
        // Исходные данные
        let state = { name: "", balance: 0, lvl: 0, mult: 1 };
        const powers =;
        const costs =;

        // Загрузка
        const saved = localStorage.getItem('neobank_final_save');
        if (saved) {
            state = JSON.parse(saved);
            if (state.name) showGame();
        }

        // Регистрация
        document.getElementById('start-btn').onclick = function() {
            const name = document.getElementById('username').value.trim();
            if (name) {
                state.name = name;
                save();
                showGame();
            } else { alert("Введите имя!"); }
        };

        function showGame() {
            document.getElementById('reg-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('client-display').innerText = "КЛИЕНТ: " + state.name.toUpperCase();
            updateUI();
        }

        // Клик
        document.getElementById('coin-btn').onclick = function(e) {
            let gain = powers[state.lvl] * state.mult;
            state.balance += gain;
            
            const plus = document.createElement('div');
            plus.innerText = `+${gain}`;
            plus.className = 'plus-one';
            plus.style.left = e.clientX + 'px';
            plus.style.top = e.clientY + 'px';
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 800);
            
            updateUI();
            save();
        };

        // Покупка уровней
        for (let i = 1; i <= 7; i++) {
            document.getElementById('u' + i).onclick = function() {
                let cost = costs[i-1];
                if (state.balance >= cost) {
                    state.balance -= cost;
                    state.lvl = i;
                    updateUI();
                    save();
                }
            };
        }

        // Ребиртхи
        document.getElementById('rb1').onclick = function() { rebirth(15000, 2); };
        document.getElementById('rb2').onclick = function() { rebirth(50000, 3); };
        document.getElementById('rb3').onclick = function() { rebirth(200000, 4); };

        function rebirth(cost, m) {
            if (state.balance >= cost) {
                state.balance = 0; state.lvl = 0; state.mult = m;
                updateUI(); save();
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('per-tap').innerText = (powers[state.lvl] * state.mult).toLocaleString();
            document.getElementById('mult-tag').innerText = `МНОЖИТЕЛЬ: x${state.mult}`;

            // Видимость кнопок LVL
            for (let i = 1; i <= 7; i++) {
                let btn = document.getElementById('u' + i);
                btn.style.display = (state.lvl === i - 1) ? 'block' : 'none';
                btn.disabled = state.balance < costs[i - 1];
            }
            document.getElementById('max-lvl').style.display = (state.lvl === 7) ? 'block' : 'none';

            // Видимость ребиртхов
            const r1 = document.getElementById('rb1'), r2 = document.getElementById('rb2'), r3 = document.getElementById('rb3');
            r1.style.display = (state.mult === 1 && (state.balance >= 10000 || state.lvl >= 4)) ? 'block' : 'none';
            r1.disabled = state.balance < 15000;
            
            r2.style.display = (state.mult === 2 && (state.balance >= 40000 || state.lvl >= 5)) ? 'block' : 'none';
            r2.disabled = state.balance < 50000;

            r3.style.display = (state.mult === 3 && (state.balance >= 150000 || state.lvl >= 6)) ? 'block' : 'none';
            r3.disabled = state.balance < 200000;
        }

        function save() { localStorage.setItem('neobank_final_save', JSON.stringify(state)); }
        function resetAll() { if(confirm("Сбросить весь прогресс?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
