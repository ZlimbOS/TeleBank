<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Fixed Edition</title>
    <style>
        :root { --p: #00ff88; --bg: #020617; --rb: #f093fb; }
        body { 
            font-family: sans-serif; background: var(--bg); color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; user-select: none; overflow: hidden; 
        }
        #snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        /* Кнопка промокода в углу */
        .promo-btn-top {
            position: absolute; top: 20px; right: 20px;
            background: #3b82f6; color: white; padding: 10px 15px;
            border-radius: 10px; font-size: 12px; font-weight: bold;
            cursor: pointer; z-index: 100; border: none;
        }

        .card { 
            background: rgba(15, 23, 42, 0.9); padding: 30px; 
            border-radius: 30px; text-align: center; width: 340px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 10; position: relative;
        }
        .bal { font-size: 2.5rem; font-weight: 900; color: var(--p); margin: 10px 0; }
        
        .coin { 
            width: 140px; height: 140px; background: orange; 
            border-radius: 50%; margin: 20px auto; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 70px; box-shadow: 0 0 30px rgba(255, 165, 0, 0.5); 
            transition: 0.1s; position: relative; z-index: 50;
        }
        .coin:active { transform: scale(0.9); }

        .btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            margin-top: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; 
        }
        .u-btn { background: var(--p); color: #000; }
        .r-btn { background: var(--rb); color: #fff; }
        button:disabled { opacity: 0.1; cursor: not-allowed; }

        .plus { 
            position: absolute; color: var(--p); font-weight: bold; 
            animation: f 0.8s forwards; pointer-events: none; z-index: 200;
        }
        @keyframes f { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="snow"></canvas>
<button class="promo-btn-top" id="promo-trigger">ПРОМОКОД 🎁</button>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px;">TELEBANK ULTIMATE</div>
    <div class="bal"><span id="balance-display">0</span> ₽</div>
    <div id="mult-display" style="color: var(--rb); font-weight: bold; font-size: 0.9rem;">МНОЖИТЕЛЬ: x1</div>
    
    <div class="coin" id="coin-element">🪙</div>
    
    <div id="game-shop">
        <p>ДОХОД: <span id="tap-display" style="color: var(--p)">100</span> ₽</p>
        <div id="lvl-btn-slot"></div>
        <div id="rb-btn-slot"></div>
        <div id="max-info" style="display:none; color: gold; font-weight: bold;">MAX POWER 👑</div>
    </div>
</div>

<script>
    // 1. ДАННЫЕ
    const tapPowers =;
    const upgradeCosts =;
    const rebirths = [
        { cost: 15000, mult: 2, label: "x2" },
        { cost: 50000, mult: 3, label: "x3" },
        { cost: 200000, mult: 4, label: "x4" },
        { cost: 10000000, mult: 10, label: "x10" },
        { cost: 100000000, mult: 100, label: "ULTRA x100" }
    ];

    let game = { balance: 0, level: 0, mult: 1, promoUsed: false };

    // Загрузка
    const saved = localStorage.getItem('telebank_final_v100');
    if (saved) game = JSON.parse(saved);

    // 2. ТАПЫ (ПРЯМАЯ ПРИВЯЗКА)
    const coin = document.getElementById('coin-element');
    coin.onclick = function(e) {
        let gain = tapPowers[game.level] * game.mult;
        game.balance += gain;
        
        // Анимация
        const p = document.createElement('div');
        p.className = 'plus'; p.innerText = "+" + gain.toLocaleString();
        p.style.left = e.clientX + "px"; p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        
        update();
    };

    // 3. ПРОМОКОД (ЧЕРЕЗ PROMPT - 100% РАБОТАЕТ)
    document.getElementById('promo-trigger').onclick = function() {
        if (game.promoUsed) {
            alert("Промокод уже использован!");
            return;
        }
        let code = prompt("Введите промокод:");
        if (code && code.toUpperCase() === "РУБЦОВ") {
            game.balance += 100000;
            game.promoUsed = true;
            alert("Успех! +100,000 ₽");
            update();
        } else if (code !== null) {
            alert("Неверный код!");
        }
    };

    // 4. МАГАЗИН
    function buyLvl() {
        let cost = upgradeCosts[game.level];
        if (game.balance >= cost) {
            game.balance -= cost;
            game.level++;
            update();
        }
    }

    function buyRb(idx) {
        let rb = rebirths[idx];
        if (game.balance >= rb.cost) {
            game.balance = 0; game.level = 0;
            game.mult = rb.mult;
            update();
        }
    }

    // 5. ОБНОВЛЕНИЕ ИНТЕРФЕЙСА
    function update() {
        document.getElementById('balance-display').innerText = Math.floor(game.balance).toLocaleString();
        document.getElementById('tap-display').innerText = (tapPowers[game.level] * game.mult).toLocaleString();
        document.getElementById('mult-display').innerText = "МНОЖИТЕЛЬ: x" + game.mult;

        if (game.promoUsed) document.getElementById('promo-trigger').style.display = 'none';

        // Кнопка уровня
        const lvlSlot = document.getElementById('lvl-btn-slot');
        if (game.level < 8) {
            lvlSlot.innerHTML = `<button class="btn u-btn" onclick="buyLvl()">LEVEL ${game.level + 2} (${upgradeCosts[game.level].toLocaleString()} ₽)</button>`;
            lvlSlot.querySelector('button').disabled = game.balance < upgradeCosts[game.level];
        } else {
            lvlSlot.innerHTML = "";
            document.getElementById('max-info').style.display = 'block';
        }

        // Кнопка ребирта
        const rbSlot = document.getElementById('rb-btn-slot');
        let nextRbIdx = rebirths.findIndex(r => r.mult > game.mult);
        if (nextRbIdx !== -1) {
            let rb = rebirths[nextRbIdx];
            rbSlot.innerHTML = `<button class="btn r-btn" onclick="buyRb(${nextRbIdx})">REBIRTH ${rb.label} (${rb.cost.toLocaleString()} ₽)</button>`;
            rbSlot.querySelector('button').disabled = game.balance < rb.cost;
        } else {
            rbSlot.innerHTML = "";
        }

        localStorage.setItem('telebank_final_v100', JSON.stringify(game));
    }

    // 6. СНЕГ (ЗАДНИЙ ПЛАН)
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');
    let flakes = [];
    function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = res; res();
    for(let i=0; i<70; i++) flakes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, s: Math.random()*1+0.5});
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white"; ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            f.y += f.s; if(f.y > canvas.height) f.y = -10;
        });
        ctx.fill(); requestAnimationFrame(draw);
    }
    draw();

    update();
</script>
</body>
</html>
