<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Season 2 Turbo Fix</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --p: #00ff88; --bg: #030712; --rb: #f093fb; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: white; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; 
            user-select: none; overflow: hidden; 
        }
        #snow-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        /* ОКНО АВТОРИЗАЦИИ */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .auth-card {
            background: #111827; padding: 30px; border-radius: 25px;
            border: 2px solid var(--p); width: 320px; text-align: center;
            box-shadow: 0 0 50px rgba(0,255,136,0.3);
        }
        .auth-input {
            width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #374151; background: #eef2ff; color: #000; 
            outline: none; font-weight: bold; font-size: 1rem;
        }

        .season-header { font-size: 2.5rem; font-weight: 900; letter-spacing: 8px; margin-bottom: 15px; z-index: 10; text-shadow: 0 0 20px #fff; }

        .card { 
            background: rgba(15, 23, 42, 0.95); padding: 25px; border-radius: 30px; 
            text-align: center; width: 340px; border: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }
        .money-val { font-size: 1.8rem; font-weight: 900; color: var(--p); margin: 5px 0; }
        
        .coin-btn { 
            width: 120px; height: 120px; background: radial-gradient(circle, #ffd700, #ff8c00); 
            border-radius: 50%; margin: 15px auto; cursor: pointer; display: flex; 
            justify-content: center; align-items: center; font-size: 60px; 
            transition: 0.1s; border: 5px solid rgba(255,255,255,0.2);
        }

        button.game-btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            margin-top: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; 
            transition: 0.1s;
        }
        .u-btn { background: var(--p); color: #000; box-shadow: 0 4px 0 #009b52; }
        .r-btn { background: var(--rb); color: white; box-shadow: 0 4px 0 #b56dbf; }
        
        /* Анимация нажатия - ТЕПЕРЬ ОНА ЕСТЬ */
        button.game-btn:active { transform: translateY(3px); box-shadow: none !important; opacity: 0.8; }
        .coin-btn:active { transform: scale(0.9); }
        
        #logout-btn { position: absolute; bottom: 20px; right: 20px; background: none; border: 1px solid red; color: red; padding: 5px 10px; border-radius: 5px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<canvas id="snow-box"></canvas>

<!-- ОКНО АВТОРИЗАЦИИ -->
<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="margin:0 0 20px 0; color:var(--p); font-size: 1.5rem; letter-spacing: 2px;">ВХОД / РЕГИСТРАЦИЯ</h2>
        <input type="text" id="username" class="auth-input" placeholder="Ваш логин">
        <input type="password" id="password" class="auth-input" placeholder="Ваш пароль">
        <button class="game-btn u-btn" id="login-click">ВОЙТИ</button>
        <button class="game-btn r-btn" id="reg-click">СОЗДАТЬ АККАУНТ</button>
        <p id="status" style="font-size: 0.8rem; margin-top:20px; color: #9ca3af">Система готова</p>
    </div>
</div>

<div class="season-header">СЕЗОН 2</div>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px;">АККАУНТ: <span id="u-name">?</span></div>
    <div class="money-val" id="bal">0 ₽</div>
    <div id="m-info" style="color: var(--rb); font-size: 0.9rem; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
    <div class="coin-btn" id="coin">🪙</div>
    <div id="shop">
        <p style="font-size: 0.85rem;">ДОХОД: <span id="inc-val" style="color: var(--p)">100</span> ₽</p>
        <div id="u-area"></div>
        <div id="r-area"></div>
    </div>
</div>

<button id="logout-btn" onclick="logout()">ВЫЙТИ</button>

<script>
    // 1. НАСТРОЙКА СЕТИ (Добавлено больше реле для скорости)
    const gun = Gun({
        peers: [
            'https://herokuapp.com',
            'https://peer.ooo',
            'https://herokuapp.com'
        ]
    });
    const user = gun.user().recall({localStorage: true});

    const POWERS = [100n, 200n, 400n, 1000n, 5000n, 20000n, 100000n, 500000n, 1000000n, 2000000n, 600000000n, 2000000000n, 2000000000n * 1000n];
    const COSTS = [1000n, 5000n, 20000n, 100000n, 1000000n, 10000000n, 100000000n, 1000000000n, 10000000000n, 100000000000n, 15000000000000000n];
    const REBIRTHS = [{ c: 1000000n, m: 10n, n: "x10" }, { c: 2000000000000n, m: 400n, n: "x400" }, { c: 2000000000000000n, m: 5000n, n: "OMEGA x5000" }];

    let state = { b: 0n, l: 0, m: 1n, name: "" };
    let tapWait = false;

    // 2. ИСПРАВЛЕННЫЙ ВХОД И РЕГИСТРАЦИЯ
    document.getElementById('reg-click').onclick = () => {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u.length < 3) return alert("Логин слишком короткий!");
        
        document.getElementById('status').innerText = "Регистрация в сети...";
        user.create(u, p, (ack) => {
            if(ack.err) {
                alert("Ошибка: " + ack.err);
                document.getElementById('status').innerText = "Попробуйте другое имя";
            } else {
                alert("Аккаунт создан! Нажмите ВОЙТИ");
                document.getElementById('status').innerText = "Готово к входу";
            }
        });
    };

    document.getElementById('login-click').onclick = () => {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        document.getElementById('status').innerText = "Авторизация...";
        
        user.auth(u, p, (ack) => {
            if(ack.err) {
                alert("Неверный логин или пароль!");
                document.getElementById('status').innerText = "Ошибка входа";
            } else {
                // Если вход успешен, убираем окно сразу
                document.getElementById('auth-overlay').style.display = 'none';
                location.reload(); 
            }
        });
    };

    // ПРОВЕРКА СОСТОЯНИЯ ПРИ ЗАГРУЗКЕ
    if(user.is) {
        document.getElementById('auth-overlay').style.display = 'none';
        user.get('alias').once(n => {
            state.name = n;
            document.getElementById('u-name').innerText = n;
            // Загрузка игровых данных
            user.get('game_season2_final').once(d => {
                if(d) {
                    state.b = BigInt(d.b || "0");
                    state.l = d.l || 0;
                    state.m = BigInt(d.m || "1");
                }
                refresh();
            });
        });
    }

    function save() {
        if(user.is) {
            user.get('game_season2_final').put({
                b: state.b.toString(),
                l: state.l,
                m: state.m.toString()
            });
        }
    }

    function logout() { user.leave(); localStorage.clear(); location.reload(); }

    // 3. ГЕЙМПЛЕЙ И ФОРМАТИРОВАНИЕ
    function f(n) {
        let num = BigInt(n);
        if (num >= 1e15) return (Number(num / 1000000000000n) / 1000).toFixed(2) + " КВАДР";
        if (num >= 1e12) return (Number(num / 1000000000n) / 1000).toFixed(2) + " ТРЛН";
        if (num >= 1e9) return (Number(num / 1000000n) / 1000).toFixed(1) + " МЛРД";
        return num.toLocaleString();
    }

    // Авто-доход раз в секунду
    setInterval(() => {
        if (state.l >= 9 && user.is) {
            state.b += POWERS[state.l] * state.m;
            refresh();
            save();
        }
    }, 1000);

    // Тап (защита 0.1с)
    document.getElementById('coin').onclick = (e) => {
        if (tapWait || !user.is) return;
        tapWait = true;
        state.b += POWERS[state.l] * state.m;
        setTimeout(() => { tapWait = false; }, 100);
        refresh();
        save();
    };

    window.buyL = () => {
        if (state.b >= COSTS[state.l]) {
            state.b -= COSTS[state.l];
            state.l++;
            save();
            refresh();
        }
    };

    window.buyR = (i) => {
        if (state.b >= REBIRTHS[i].c) {
            state.b = 0n;
            state.l = 0;
            state.m = REBIRTHS[i].m;
            save();
            refresh();
        }
    };

    function refresh() {
        document.getElementById('bal').innerText = f(state.b) + " ₽";
        document.getElementById('m-info').innerText = "МНОЖИТЕЛЬ: x" + state.m;
        let isA = state.l >= 9;
        document.getElementById('inc-val').innerText = f(POWERS[state.l] * state.m) + (isA ? " /СЕК" : " /ТАП");
        
        const uArea = document.getElementById('u-area');
        if (state.l < COSTS.length) {
            let cost = COSTS[state.l];
            uArea.innerHTML = `<button class="game-btn u-btn" onclick="buyL()" ${state.b < cost ? 'disabled' : ''}>LVL ${state.l + 2}: ${f(cost)} ₽</button>`;
        } else {
            uArea.innerHTML = "MAX LEVEL 👑";
        }
        
        const rArea = document.getElementById('r-area');
        let nextIdx = REBIRTHS.findIndex(r => r.m > state.m);
        if (nextIdx !== -1) {
            let rb = REBIRTHS[nextIdx];
            rArea.innerHTML = `<button class="game-btn r-btn" onclick="buyR(${nextIdx})" ${state.b < rb.c ? 'disabled' : ''}>REBIRTH ${rb.n} (${f(rb.c)} ₽)</button>`;
        } else {
            rArea.innerHTML = "";
        }
    }

    // Снежинки
    const canvas = document.getElementById('snow-box');
    const ctx = canvas.getContext('2d');
    let flakes = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    for(let i=0; i<30; i++) flakes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, s: Math.random()*1+0.2});
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white";
        ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y);
            ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            f.y += f.s;
            if(f.y > canvas.height) f.y = -5;
        });
        ctx.fill();
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
