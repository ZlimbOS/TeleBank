<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Winter Ultimate</title>
    <style>
        :root { --p: #00ff88; --bg: #020617; --rb: #f093fb; --blue: #3b82f6; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: white; display: flex; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; 
            user-select: none; overflow: hidden; 
        }

        #snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* Кнопка промокода сверху справа */
        .promo-trigger {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px 15px; border-radius: 10px;
            font-size: 12px; cursor: pointer; z-index: 100; backdrop-filter: blur(5px);
        }
        .promo-trigger:hover { background: rgba(255,255,255,0.2); }

        .card { 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 35px; text-align: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); width: 340px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }

        .bal-val { font-size: 2.5rem; font-weight: 900; color: var(--p); margin: 5px 0; text-shadow: 0 0 15px rgba(0,255,136,0.3); }

        .coin { 
            width: 140px; height: 140px; 
            background: radial-gradient(circle, #ffd700, #ff8c00); 
            border-radius: 50%; margin: 25px auto; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 70px; box-shadow: 0 0 35px rgba(255, 215, 0, 0.4); 
            transition: 0.1s; border: 4px solid rgba(255,255,255,0.2);
            position: relative; z-index: 50;
        }
        .coin:active { transform: scale(0.9); }

        button { 
            width: 100%; padding: 15px; border-radius: 14px; border: none; 
            margin-top: 10px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s;
        }
        .u-btn { background: var(--p); color: #052e16; }
        .r-btn { background: var(--rb); color: white; }
        button:disabled { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }

        /* Модальное окно промокода */
        #promo-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1e293b; padding: 30px; border-radius: 20px; width: 280px; text-align: center;
            border: 1px solid var(--blue);
        }
        input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155;
            background: #0f172a; color: white; text-align: center; margin-bottom: 15px; outline: none; box-sizing: border-box;
        }

        .plus { 
            position: absolute; color: var(--p); font-weight: bold; 
            animation: f 0.8s forwards; pointer-events: none; 
            font-size: 1.6rem; z-index: 150; text-shadow: 0 0 5px #000;
        }
        @keyframes f { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-130px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="snow"></canvas>

<div class="promo-trigger" id="open-promo">ПРОМОКОД 🎁</div>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px;">TELEBANK WINTER V.7</div>
    <div class="bal-val"><span id="b-val">0</span> ₽</div>
    <div id="m-info" style="color: var(--rb); font-size: 0.8rem; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
    
    <div class="coin" id="tap-coin">🪙</div>
    
    <div id="shop">
        <p style="font-size: 0.85rem; margin-bottom: 15px;">ДОХОД: <span id="p-val" style="color: var(--p)">100</span> ₽/ТАП</p>
        <div id="u-slot"></div>
        <div id="r-slot"></div>
        <div id="max-msg" style="display:none; color: gold; font-weight:bold; margin-top:10px;">ULTIMATE POWER 👑</div>
    </div>
</div>

<!-- Модалка -->
<div id="promo-modal">
    <div class="modal-content">
        <h3 style="margin-top:0">АКТИВАЦИЯ</h3>
        <input type="text" id="promo-input" placeholder="ВВЕДИТЕ КОД">
        <button class="u-btn" id="promo-submit">ОК</button>
        <button style="background:none; color:gray; font-size:12px;" id="close-promo">Закрыть</button>
    </div>
</div>

<script>
    // 1. ДАННЫЕ
    const POWERS =;
    const COSTS =;
    const RBS = [
        { c: 15000, m: 2, n: "x2" },
        { c: 50000, m: 3, n: "x3" },
        { c: 200000, m: 4, n: "x4" },
        { c: 10000000, m: 10, n: "MEGA x10" },
        { c: 100000000, m: 100, n: "ULTRA x100" }
    ];

    let game = { b: 0, l: 0, m: 1, p: false };

    // Загрузка
    const saved = localStorage.getItem('tb_winter_v7');
    if (saved) game = JSON.parse(saved);

    // 2. СИСТЕМА КЛИКА (ИСПРАВЛЕНО)
    document.getElementById('tap-coin').onclick = function(e) {
        let gain = POWERS[game.l] * game.m;
        game.b += gain;
        
        const p = document.createElement('div');
        p.className = 'plus'; p.innerText = "+" + gain.toLocaleString();
        p.style.left = e.clientX + "px"; p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        
        refresh();
    };

    // 3. МАГАЗИН
    function buyU() {
        if (game.b >= COSTS[game.l]) {
            game.b -= COSTS[game.l]; game.l++; refresh();
        }
    }

    function buyR(idx) {
        if (game.b >= RBS[idx].c) {
            game.b = 0; game.l = 0; game.m = RBS[idx].m; refresh();
        }
    }

    // 4. ПРОМОКОД
    const modal = document.getElementById('promo-modal');
    document.getElementById('open-promo').onclick = () => {
        if(game.p) alert("Вы уже использовали промокод!");
        else modal.style.display = 'flex';
    };
    document.getElementById('close-promo').onclick = () => modal.style.display = 'none';

    document.getElementById('promo-submit').onclick = () => {
        const val = document.getElementById('promo-input').value.trim().toUpperCase();
        if (val === "РУБЦОВ") {
            game.b += 100000;
            game.p = true;
            modal.style.display = 'none';
            document.getElementById('open-promo').style.display = 'none';
            alert("УСПЕХ! +100,000 ₽");
            refresh();
        } else { alert("НЕВЕРНЫЙ КОД"); }
    };

    // 5. ОБНОВЛЕНИЕ
    function refresh() {
        document.getElementById('b-val').innerText = Math.floor(game.b).toLocaleString();
        document.getElementById('p-val').innerText = (POWERS[game.l] * game.m).toLocaleString();
        document.getElementById('m-info').innerText = "МНОЖИТЕЛЬ СИСТЕМЫ: x" + game.multName(); // Для красоты

        if (game.p) document.getElementById('open-promo').style.display = 'none';

        const uSlot = document.getElementById('u-slot');
        if (game.l < 8) {
            uSlot.innerHTML = `<button class="u-btn" onclick="buyU()">LEVEL ${game.l + 2} (${COSTS[game.l].toLocaleString()} ₽)</button>`;
            uSlot.querySelector('button').disabled = game.b < COSTS[game.l];
            document.getElementById('max-msg').style.display = 'none';
        } else {
            uSlot.innerHTML = ""; document.getElementById('max-msg').style.display = 'block';
        }

        const rSlot = document.getElementById('r-slot');
        const nextIdx = RBS.findIndex(r => r.m > game.m);
        if (nextIdx !== -1) {
            const rb = RBS[nextIdx];
            rSlot.innerHTML = `<button class="r-btn" onclick="buyR(${nextIdx})">REBIRTH ${rb.n} (${rb.c.toLocaleString()} ₽)</button>`;
            rSlot.querySelector('button').disabled = game.b < rb.c;
        } else { rSlot.innerHTML = ""; }

        localStorage.setItem('tb_winter_v7', JSON.stringify(game));
    }

    // Хелпер для множителя
    game.multName = function() {
        return RBS.find(r => r.m === game.m)?.m || 1;
    };

    // 6. СНЕГ
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');
    let flakes = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    for(let i=0; i<80; i++) flakes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, s: Math.random()*1+0.5});
    function drawSnow() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white"; ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            f.y += f.s; if(f.y > canvas.height) f.y = -10;
        });
        ctx.fill(); requestAnimationFrame(drawSnow);
    }
    drawSnow();

    refresh();
</script>
</body>
</html>
