<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoBank Clicker | Evolution</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --rebirth: #f093fb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 340px;
            position: relative;
        }

        h2 { font-size: 1.5rem; margin-bottom: 20px; color: var(--primary); }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00bd65);
            color: #052e16;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4); }
        button:disabled { filter: grayscale(1); opacity: 0.3; cursor: not-allowed; }

        /* Кнопка ребиртха */
        .rebirth-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            margin-top: 20px;
        }

        .coin-container {
            position: relative;
            margin: 25px 0;
            display: flex;
            justify-content: center;
        }

        .coin {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            transition: transform 0.05s;
        }

        .coin:active { transform: scale(0.92); }

        .plus-one {
            position: absolute;
            color: var(--primary);
            font-weight: bold;
            animation: floatUp 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .stats-box {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
        }

        .balance-label { font-size: 0.7rem; opacity: 0.7; letter-spacing: 1px; }
        .balance-value { font-size: 1.8rem; font-weight: bold; display: block; color: var(--primary); }
        .multiplier-tag { font-size: 0.8rem; color: #f093fb; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="reg-screen" class="container">
        <h2>NeoBank</h2>
        <input type="text" id="username" placeholder="Ваше имя" maxlength="12">
        <button onclick="register()">ОТКРЫТЬ СЧЁТ</button>
    </div>

    <div id="game-screen" class="container" style="display:none;">
        <div id="welcome" style="margin-bottom: 10px; font-size: 0.8rem; opacity: 0.6;">ЛИЧНЫЙ КАБИНЕТ</div>
        
        <div class="stats-box">
            <span class="balance-label">БАЛАНС</span>
            <span class="balance-value"><span id="balance">0</span> ₽</span>
            <div class="multiplier-tag" id="mult-tag">МНОЖИТЕЛЬ: x1</div>
        </div>

        <div class="coin-container">
            <div class="coin" onclick="tap(event)">💰</div>
        </div>

        <div id="upgrades">
            <p style="font-size: 0.8rem; margin-bottom: 10px;">За тап: <span id="per-tap">100</span> ₽</p>
            
            <!-- Уровни -->
            <button id="u1" onclick="upgrade(1, 500)">Улучшить до LVL 2 (500 ₽)</button>
            <button id="u2" onclick="upgrade(2, 1500)" style="display:none;">Улучшить до LVL 3 (1500 ₽)</button>
            <button id="u3" onclick="upgrade(3, 5000)" style="display:none;">Улучшить до LVL 4 (5000 ₽)</button>
            <button id="u4" onclick="upgrade(4, 10000)" style="display:none;">Улучшить до LVL 5 (10000 ₽)</button>
            <button id="u5" onclick="upgrade(5, 50000)" style="display:none;">Улучшить до LVL 6 (50000 ₽)</button>
            
            <!-- Ребиртхи -->
            <button id="rb1" class="rebirth-btn" onclick="doRebirth(15000, 2)" style="display:none;">РЕБИРТ x2 (15000 ₽)</button>
            <button id="rb2" class="rebirth-btn" onclick="doRebirth(50000, 3)" style="display:none;">РЕБИРТ x3 (50000 ₽)</button>
            
            <div id="max-lvl" style="display:none; color: gold; font-weight: bold; margin-top: 10px;">ULTIMATE LEVEL 👑</div>
        </div>
    </div>

    <script>
        let balance = 0;
        let currentLvl = 0;
        let multiplier = 1;

        // Твои значения уровней: 100, 200, 300, 400, 1000, 1500
        const basePowers =;

        function register() {
            const name = document.getElementById('username').value;
            if (name) {
                document.getElementById('reg-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                document.getElementById('welcome').innerText = "КЛИЕНТ: " + name.toUpperCase();
                updateUI();
            }
        }

        function tap(event) {
            let gain = basePowers[currentLvl] * multiplier;
            balance += gain;
            
            const plus = document.createElement('div');
            plus.innerText = `+${gain}`;
            plus.className = 'plus-one';
            plus.style.left = `${event.clientX - 20}px`;
            plus.style.top = `${event.clientY - 40}px`;
            plus.style.position = 'fixed';
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 800);
            
            updateUI();
        }

        function upgrade(lvl, cost) {
            if (balance >= cost) {
                balance -= cost;
                currentLvl = lvl;
                updateUI();
            }
        }

        function doRebirth(cost, newMult) {
            if (balance >= cost) {
                balance = 0;
                currentLvl = 0;
                multiplier = newMult;
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('per-tap').innerText = (basePowers[currentLvl] * multiplier).toLocaleString();
            document.getElementById('mult-tag').innerText = `МНОЖИТЕЛЬ: x${multiplier}`;

            // Управление кнопками уровней
            for(let i=1; i<=5; i++) {
                let btn = document.getElementById('u' + i);
                btn.style.display = (currentLvl === i-1) ? 'block' : 'none';
            }
            document.getElementById('max-lvl').style.display = (currentLvl === 5) ? 'block' : 'none';

            // Проверка цен для кнопок уровней
            const upgCosts =;
            if(currentLvl < 5) {
                document.getElementById('u' + (currentLvl + 1)).disabled = balance < upgCosts[currentLvl];
            }

            // Управление Ребиртхами
            const rb1 = document.getElementById('rb1');
            const rb2 = document.getElementById('rb2');

            if (multiplier === 1) {
                rb1.style.display = 'block';
                rb1.disabled = balance < 15000;
                rb2.style.display = 'none';
            } else if (multiplier === 2) {
                rb1.style.display = 'none';
                rb2.style.display = 'block';
                rb2.disabled = balance < 50000;
            } else {
                rb1.style.display = 'none';
                rb2.style.display = 'none';
            }
        }
    </script>
</body>
</html>
