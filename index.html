<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleBank | Winter Ultimate Fixed</title>
    <style>
        :root { --p: #00ff88; --bg: #030712; --rb: #f093fb; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: white; display: flex; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; 
            user-select: none; overflow: hidden; 
        }
        #snow-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .card { 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 30px; text-align: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); width: 350px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }
        .money-val { font-size: 2.2rem; font-weight: 900; color: var(--p); margin: 10px 0; text-shadow: 0 0 20px rgba(0,255,136,0.4); }
        .coin-btn { 
            width: 140px; height: 140px; 
            background: radial-gradient(circle, #ffd700, #ff8c00); 
            border-radius: 50%; margin: 20px auto; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 70px; box-shadow: 0 0 40px rgba(255, 165, 0, 0.4); 
            transition: 0.1s; border: 5px solid rgba(255,255,255,0.2);
            position: relative; z-index: 20;
        }
        .coin-btn:active { transform: scale(0.92); }
        button.game-btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            margin-top: 8px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s;
        }
        .u-btn { background: var(--p); color: #000; }
        .r-btn { background: var(--rb); color: white; }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        .plus { 
            position: absolute; color: var(--p); font-weight: bold; 
            animation: moveUp 0.8s forwards; pointer-events: none; 
            font-size: 1.4rem; z-index: 150; text-shadow: 0 0 5px #000;
        }
        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="snow-box"></canvas>

<div class="card">
    <div style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px;">TELEBANK ULTIMATE v.FIX</div>
    <div class="money-val" id="balance-display">0 ₽</div>
    <div id="mult-info" style="color: var(--rb); font-size: 0.9rem; font-weight: bold;">МНОЖИТЕЛЬ: x1</div>
    
    <div class="coin-btn" id="main-coin">🪙</div>
    
    <div id="shop">
        <p style="font-size: 0.9rem;"><span id="income-label">ДОХОД:</span> <span id="income-val" style="color: var(--p)">100</span> ₽</p>
        <div id="upgrade-area"></div>
        <div id="rebirth-area"></div>
    </div>
</div>

<script>
    // 1. УМНОЕ ФОРМАТИРОВАНИЕ
    function format(n) {
        if (n >= 1e15) return (n / 1e15).toFixed(2) + " КВАНТ";
        if (n >= 1e12) return (n / 1e12).toFixed(2) + " ТРЛН";
        if (n >= 1e9) return (n / 1e9).toFixed(2) + " МЛРД";
        if (n >= 1e6) return (n / 1e6).toFixed(1) + " МЛН";
        return Math.floor(n).toLocaleString();
    }

    // 2. ДАННЫЕ (11 уровней, последний 250млрд дает 600млн/сек)
    const POWERS =; 
    const COSTS =; 

    const REBIRTHS = [
        { c: 15000, m: 2, n: "x2" },
        { c: 1000000, m: 10, n: "x10" },
        { c: 100000000, m: 100, n: "x100" },
        { c: 250000000000, m: 200, n: "x200" },
        { c: 2000000000000, m: 400, n: "x400" }
    ];

    let state = { b: 0, l: 0, m: 1 };

    // Загрузка
    const saved = localStorage.getItem('tb_final_fixed');
    if (saved) state = Object.assign(state, JSON.parse(saved));

    // 3. ЯДРО ДОХОДА
    function getRawPower() {
        return POWERS[state.l];
    }

    // Пассивный доход (начиная с 10 уровня и выше)
    setInterval(() => {
        if (state.l >= 9) {
            state.b += getRawPower() * state.m;
            updateUI();
        }
    }, 1000);

    // Клик
    document.getElementById('main-coin').onclick = function(e) {
        let gain = getRawPower() * state.m;
        state.b += gain;
        
        const anim = document.createElement('div');
        anim.className = 'plus';
        anim.innerText = "+" + format(gain);
        anim.style.left = e.clientX + "px";
        anim.style.top = e.clientY + "px";
        document.body.appendChild(anim);
        setTimeout(() => anim.remove(), 800);
        
        updateUI();
    };

    // 4. МАГАЗИН
    window.buyLvl = function() {
        if (state.b >= COSTS[state.l]) {
            state.b -= COSTS[state.l];
            state.l++;
            save();
            updateUI();
        }
    }

    window.buyRb = function(idx) {
        if (state.b >= REBIRTHS[idx].c) {
            state.b = 0; state.l = 0; state.m = REBIRTHS[idx].m;
            save();
            updateUI();
        }
    }

    function save() { localStorage.setItem('tb_final_fixed', JSON.stringify(state)); }

    // 5. ИНТЕРФЕЙС
    function updateUI() {
        document.getElementById('balance-display').innerText = format(state.b) + " ₽";
        document.getElementById('mult-info').innerText = "МНОЖИТЕЛЬ: x" + state.m;
        
        const isAuto = state.l >= 9;
        document.getElementById('income-label').innerText = isAuto ? "АВТО-ДОХОД:" : "ДОХОД:";
        document.getElementById('income-val').innerText = format(getRawPower() * state.m) + (isAuto ? " /СЕК" : " /ТАП");
        document.getElementById('income-val').style.color = isAuto ? "gold" : "var(--p)";

        // Кнопка улучшения
        const uArea = document.getElementById('upgrade-area');
        if (state.l < COSTS.length) {
            uArea.innerHTML = `<button class="game-btn u-btn" onclick="buyLvl()">LVL ${state.l + 2}: ${format(COSTS[state.l])} ₽</button>`;
            uArea.querySelector('button').disabled = state.b < COSTS[state.l];
        } else {
            uArea.innerHTML = "<div style='color:gold; margin:10px 0; font-weight:bold;'>MAX LEVEL REACHED 👑</div>";
        }

        // Кнопка ребирха
        const rArea = document.getElementById('rebirth-area');
        const nextRbIdx = REBIRTHS.findIndex(r => r.m > state.m);
        if (nextRbIdx !== -1) {
            const rb = REBIRTHS[nextRbIdx];
            rArea.innerHTML = `<button class="game-btn r-btn" onclick="buyRb(${nextRbIdx})">REBIRTH ${rb.n} (${format(rb.c)} ₽)</button>`;
            rArea.querySelector('button').disabled = state.b < rb.c;
        } else {
            rArea.innerHTML = "";
        }
    }

    // 6. СНЕГ
    const canvas = document.getElementById('snow-box');
    const ctx = canvas.getContext('2d');
    let flakes = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    for(let i=0; i<70; i++) flakes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, s: Math.random()*1+0.3});
    function drawSnow() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            f.y += f.s; if(f.y > canvas.height) f.y = -5;
        });
        ctx.fill(); requestAnimationFrame(drawSnow);
    }
    drawSnow();
    updateUI();
</script>
</body>
</html>
